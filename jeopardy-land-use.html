<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Use & Planning Jeopardy — Brooklyn CB6</title>
<meta name="description" content="Test your knowledge of Land Use & Planning in this mini Jeopardy quiz from Brooklyn Community Board 6.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bkcb6.app/jeopardy-land-use.html">
<meta property="og:title" content="Land Use & Planning Jeopardy — Brooklyn CB6">
<meta property="og:description" content="Test your knowledge of Land Use & Planning in this mini Jeopardy quiz from Brooklyn Community Board 6.">
<meta property="og:image" content="https://bkcb6.app/jeopardy-preview.png">
<meta property="og:image:width" content="1080">
<meta property="og:image:height" content="1080">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Land Use & Planning Jeopardy — Brooklyn CB6">
<meta name="twitter:description" content="Test your knowledge of Land Use & Planning in this mini Jeopardy quiz from Brooklyn Community Board 6.">
<meta name="twitter:image" content="https://bkcb6.app/jeopardy-preview.png">
<style>
  :root {
    --navy: #0d1b4b;
    --orange: #f47920;
    --gold: #f5c518;
    --blue: #060ce9;
    --light-blue: #1a1aff;
    --white: #fff;
    --gray: #ccc;
    --green: #2ecc71;
    --red: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }
  .topbar {
    background: var(--navy);
    border-bottom: 3px solid var(--orange);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { width: 44px; height: 44px; flex-shrink: 0; border-radius: 4px; overflow: hidden; }
  .topbar-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .topbar-title { font-size: 1.1rem; font-weight: bold; color: var(--white); letter-spacing: 0.5px; }
  .topbar-title span { color: var(--orange); }
  .topbar-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .score-display {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.9rem;
    font-weight: bold;
    color: var(--gold);
  }
  .main { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
  .game-header { text-align: center; padding: 20px 0 10px; }
  .game-header h1 { font-size: 2rem; color: var(--gold); text-shadow: 2px 2px 8px rgba(0,0,0,0.5); letter-spacing: 2px; text-transform: uppercase; }
  .game-header p { color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-top: 6px; font-style: italic; }
  .board {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin-top: 20px;
  }
  .category-header {
    background: var(--blue);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 14px 8px;
    text-align: center;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--white);
  }
  .clue-cell {
    background: var(--blue);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 10px 6px;
    text-align: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--gold);
    cursor: pointer;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .clue-cell:hover:not(.used) { background: #2222cc; transform: scale(1.02); }
  .clue-cell.used { background: #0a0a5a; color: #0a0a5a; cursor: default; pointer-events: none; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--navy);
    border: 3px solid var(--gold);
    border-radius: 16px;
    max-width: 580px;
    width: 100%;
    padding: 32px 28px;
    text-align: center;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-category { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px; }
  .modal-value { font-size: 1.1rem; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .modal-clue { font-size: 1.4rem; line-height: 1.5; color: var(--white); margin-bottom: 28px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
  .modal-input-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .modal-input {
    font-size: 1.1rem;
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: rgba(255,255,255,0.1);
    color: var(--white);
    width: 260px;
    text-align: center;
    font-family: 'Georgia', serif;
  }
  .modal-input::placeholder { color: rgba(255,255,255,0.4); }
  .modal-input:focus { outline: none; border-color: var(--orange); }
  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: bold;
    font-family: 'Georgia', serif;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gray { background: rgba(255,255,255,0.15); color: var(--white); }
  .btn-orange { background: var(--orange); color: var(--white); }
  .modal-feedback { font-size: 1rem; min-height: 28px; margin-bottom: 10px; font-weight: bold; }
  .modal-feedback.correct { color: var(--green); }
  .modal-feedback.wrong { color: var(--red); }
  .modal-answer-reveal { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-bottom: 16px; min-height: 20px; }
  #resultsScreen { display: none; text-align: center; padding: 30px 20px; }
  #resultsScreen.active { display: block; }
  .results-title { font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
  .results-score { font-size: 3rem; font-weight: bold; color: var(--white); margin: 16px 0 4px; }
  .results-score.positive { color: var(--green); }
  .results-score.negative { color: var(--red); }
  .results-label { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 24px; }
  .results-rating { font-size: 1.2rem; color: var(--orange); margin-bottom: 28px; font-style: italic; }
  .results-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .signup-bar { background: var(--gold); text-align: center; padding: 14px 20px; margin-top: 30px; }
  .signup-bar a { color: var(--navy); font-weight: bold; text-decoration: none; font-size: 0.95rem; }
  .signup-bar a:hover { text-decoration: underline; }
  .footer { text-align: center; padding: 12px; font-size: 0.75rem; color: rgba(255,255,255,0.35); }
  .footer a { color: rgba(255,255,255,0.5); }
  @media (max-width: 500px) {
    .game-header h1 { font-size: 1.4rem; }
    .modal-clue { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo"><img src="cb6-logo.png" alt="CB6 Logo"></div>
    <div class="topbar-title">NYC Government <span>Jeopardy</span></div>
  </div>
  <div class="topbar-right">
    <div class="score-display" id="scoreDisplay">Score: $0</div>
  </div>
</div>

<div class="main">
  <div id="boardScreen">
    <div class="game-header">
      <h1>Land Use & Planning</h1>
      <p>Select a dollar value to reveal a clue. Answer in the form of a question!</p>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div id="resultsScreen">
    <div class="results-title">🏆 Round Over!</div>
    <div class="results-score" id="finalScore"></div>
    <div class="results-label">Final Score</div>
    <div class="results-rating" id="resultsRating"></div>
    <div class="results-btns">
      <button class="btn btn-gold" onclick="resetGame()">🔄 Play Again</button>
      <a href="jeopardy.html" class="btn btn-gray">🎯 Full Game</a>
      <a href="https://bkcb6.app/govhub.html" target="_blank" class="btn btn-gray">🏛 NYC Gov Hub</a>
    </div>
  </div>
</div>

<div class="modal-overlay" id="clueModal">
  <div class="modal-card">
    <div class="modal-category" id="modalCategory"></div>
    <div class="modal-value" id="modalValue"></div>
    <div class="modal-clue" id="modalClue"></div>
    <div class="modal-input-row" id="modalInputRow">
      <input type="text" class="modal-input" id="modalInput" placeholder="What is...?" />
      <button class="btn btn-gold" onclick="checkAnswer()">Submit</button>
    </div>
    <div class="modal-feedback" id="modalFeedback"></div>
    <div class="modal-answer-reveal" id="modalAnswerReveal"></div>
    <div id="modalNextRow" style="display:none;text-align:center;margin-top:8px;">
      <button class="btn btn-orange" onclick="closeModal()">Continue →</button>
    </div>
  </div>
</div>

<div class="signup-bar">
  <a href="https://docs.google.com/forms/d/1So02DHCINVIxHzq3ZKYe_wSdWGjO-9a34SJQyEEM4yU/viewform" target="_blank">
    ✉️ Sign up to find out about more puzzles &amp; games
  </a>
</div>
<div class="footer">
  Based on content from <a href="https://bkcb6.app/govhub.html" target="_blank">bkcb6.app/govhub.html</a> &middot;
  <a href="https://bkcb6.app" target="_blank">bkcb6.app</a>
</div>

<script>
const CATEGORY = [{"value": 200, "clue": "This agency administers the NYC Zoning Resolution, prepares neighborhood plans, and staffs the City Planning Commission.", "answer": "DCP", "accept": ["dcp", "dept of city planning", "department of city planning", "city planning", "nyc dcp"]}, {"value": 400, "clue": "The 197-day public review process through which major land use changes — including rezonings and special permits — are reviewed by community boards, borough presidents, CPC, and City Council.", "answer": "ULURP", "accept": ["ulurp", "uniform land use review procedure", "uniform land use review process"]}, {"value": 600, "clue": "This 13-member body reviews and votes on ULURP applications, zoning text amendments, and the city's capital budget.", "answer": "CPC", "accept": ["cpc", "city planning commission", "nyc city planning commission"]}, {"value": 800, "clue": "This agency designates and regulates NYC's landmark buildings, interior landmarks, and historic districts.", "answer": "LPC", "accept": ["lpc", "landmarks preservation commission", "landmarks commission", "nyc lpc"]}, {"value": 1000, "clue": "This type of zoning relief — requiring five specific findings under ZR §72-21 — allows a property owner to deviate from the zoning rules when strict compliance would cause undue hardship.", "answer": "Variance", "accept": ["variance", "a variance", "zoning variance"]}];
const CAT_NAME = "Land Use & Planning";
const LB_KEY = 'jeopardy_mini_jeopardy-land-use_lb';

let score = 0;
let cluesAnswered = 0;
let currentClue = null;

function initBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Category header
  const header = document.createElement('div');
  header.className = 'category-header';
  header.textContent = CAT_NAME.toUpperCase();
  board.appendChild(header);

  CATEGORY.forEach((clue, i) => {
    const cell = document.createElement('div');
    cell.className = 'clue-cell';
    cell.dataset.idx = i;
    cell.textContent = '$' + clue.value;
    cell.addEventListener('click', () => openClue(i, cell));
    board.appendChild(cell);
  });

  updateScore();
}

function openClue(idx, cell) {
  const clue = CATEGORY[idx];
  currentClue = { idx, cell, clue };

  document.getElementById('modalFeedback').textContent = '';
  document.getElementById('modalFeedback').className = 'modal-feedback';
  document.getElementById('modalAnswerReveal').textContent = '';
  document.getElementById('modalInput').value = '';
  document.getElementById('modalNextRow').style.display = 'none';
  document.getElementById('modalInputRow').style.display = 'flex';

  document.getElementById('modalCategory').textContent = CAT_NAME;
  document.getElementById('modalValue').textContent = '$' + clue.value;
  document.getElementById('modalClue').textContent = clue.clue;

  document.getElementById('clueModal').classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 100);
}

document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

function checkAnswer() {
  const input = document.getElementById('modalInput').value.trim().toLowerCase();
  const clue = currentClue.clue;
  const stripped = input.replace(/^(what|who)\s+(is|are)\s+/i,'').replace(/[?!.,;]+$/,'').trim();
  const correct = clue.accept.some(a => {
    const norm = a.toLowerCase().trim();
    return input === norm || stripped === norm;
  });

  if (correct) {
    score += clue.value;
    document.getElementById('modalFeedback').textContent = '✅ Correct! +$' + clue.value;
    document.getElementById('modalFeedback').className = 'modal-feedback correct';
  } else {
    score -= clue.value;
    document.getElementById('modalFeedback').textContent = '❌ Incorrect! -$' + clue.value;
    document.getElementById('modalFeedback').className = 'modal-feedback wrong';
    const allAnswers = [...new Set([clue.answer, ...clue.accept.map(a => a.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '))])].join(' / ');
    document.getElementById('modalAnswerReveal').textContent = 'Accepted answers: ' + allAnswers;
  }

  updateScore();
  currentClue.cell.classList.add('used');
  currentClue.cell.textContent = '';
  document.getElementById('modalInputRow').style.display = 'none';
  document.getElementById('modalNextRow').style.display = 'block';

  cluesAnswered++;
  if (cluesAnswered >= CATEGORY.length) {
    setTimeout(showResults, 800);
  }
}

function closeModal() {
  document.getElementById('clueModal').classList.remove('open');
  currentClue = null;
}

function showResults() {
  closeModal();
  document.getElementById('boardScreen').style.display = 'none';
  document.getElementById('resultsScreen').classList.add('active');

  const el = document.getElementById('finalScore');
  el.textContent = (score >= 0 ? '$' : '-$') + Math.abs(score).toLocaleString();
  el.className = 'results-score ' + (score >= 0 ? 'positive' : 'negative');

  const maxScore = CATEGORY.reduce((s, c) => s + c.value, 0);
  let rating = '';
  if (score === maxScore) rating = '🏆 Perfect score!';
  else if (score >= maxScore * 0.7) rating = '⭐ Strong knowledge!';
  else if (score >= maxScore * 0.3) rating = '📚 Good effort — keep exploring bkcb6.app!';
  else rating = '🔍 Time to review the NYC Gov Hub!';
  document.getElementById('resultsRating').textContent = rating;
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = 'Score: ' + (score >= 0 ? '$' : '-$') + Math.abs(score).toLocaleString();
}

function resetGame() {
  score = 0;
  cluesAnswered = 0;
  currentClue = null;
  document.getElementById('resultsScreen').classList.remove('active');
  document.getElementById('boardScreen').style.display = 'block';
  initBoard();
}

initBoard();
</script>
</body>
</html>
