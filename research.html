// Point in polygon (ray casting)
function pip(lng, lat, feature) {
  var g = feature.geometry;
  if (!g) return false;
  var polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
  for (var p = 0; p < polys.length; p++) {
    var ring = polys[p][0], inside = false;
    for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      var xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) inside = !inside;
    }
    if (inside) return true;
  }
  return false;
}

// Get centroid of a GeoJSON feature
function centroid(feature) {
  var g = feature.geometry;
  var coords = g.type === 'Polygon' ? g.coordinates[0] : g.coordinates[0][0];
  var lng = coords.reduce((s,c)=>s+c[0],0)/coords.length;
  var lat = coords.reduce((s,c)=>s+c[1],0)/coords.length;
  return [lat, lng];
}

    if (!dd.data) return;
    dd.data.features.forEach(function(f) {
      if (pip(cLng, cLat, f)) {
        districts[type].push(f.properties[dd.key]);
        // Highlight overlapping district
        var lyr = L.geoJSON(f, {style:{color:distColors[type],weight:2,fillColor:distColors[type],fillOpacity:.2,dashArray:'4,4'}}).addTo(map);
        highlightLayers.push(lyr);
      }
    });
  });

  // Show info panel
  var html = '<div style="font-weight:700;font-size:.85rem;color:#0d1b4b;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #f47920">'+cbName+'</div>';
  var COUNCIL_DATA = window._councilLookup || {};
  var ASSEMBLY_DATA = window._assemblyLookup || {};
  var SENATE_DATA = window._senateLookup || {};
  var CONGRESS_DATA = window._congressLookup || {};

  function distRow(icon, label, nums, lookup) {
    if (!nums.length) return '';
    var items = nums.map(function(n) {
      var info = lookup[n];
      return info ? '<a href="'+info[1]+'" target="_blank" style="color:#0d1b4b;font-weight:600;text-decoration:none">'+info[0]+'</a> <span style="color:#888">('+label+' '+n+')</span>' : label+' '+n;
    }).join('<br>');
    return '<tr><td style="padding:5px 10px 5px 0;vertical-align:top;white-space:nowrap;font-size:.75rem"><span style="font-size:.85rem">'+icon+'</span></td><td style="padding:5px 0;font-size:.78rem;line-height:1.6">'+items+'</td></tr>';
  }

  html += '<table style="border-collapse:collapse;width:100%">';
  html += distRow('🏙', 'Council', districts.cc, COUNCIL_DATA);
  html += distRow('🏛', 'AD', districts.assembly, ASSEMBLY_DATA);
  html += distRow('⚖️', 'SD', districts.senate, SENATE_DATA);
  html += distRow('🇺🇸', 'NY', districts.congress, CONGRESS_DATA);
  html += '</table>';
  html += '<div style="margin-top:8px"><a href="cb-'+boroName.toLowerCase().replace(' ','') +'-'+num+'.html" style="font-size:.72rem;font-family:DM Mono,monospace;color:#f47920;font-weight:700">View CB profile ↗</a></div>';

  document.getElementById('s-result').style.cssText = 'display:block;padding:10px 14px;background:#fff;border-bottom:2px solid #f47920;flex-shrink:0';
  document.getElementById('s-result').innerHTML = html;
}

function buildCDLayer(){
  if(cdsLayer) map.removeLayer(cdsLayer);
  cdsLayer = L.geoJSON(cdsData,{
    style:f=>{
      const code=f.properties.boro_cd||'';
      const boro=code.charAt(0);
      return {color:BORO_COLORS[boro]||'#888',weight:1.5,fillColor:BORO_COLORS[boro]||'#888',fillOpacity:.2};
    },
    onEachFeature:(f,l)=>{
      const code=f.properties.boro_cd||'';
      const boro=code.charAt(0);
      const num=parseInt(code.slice(1));
      const name=(BORO_NAMES[boro]||'CB')+' '+num;
      l.bindTooltip('<strong>'+name+'</strong>',{sticky:true,direction:'top'});
      l.on('click', function(){
        // Load all legislative data first if not loaded
        Promise.all([
          window._ccData ? Promise.resolve() : fetch('data/city-council-districts.geojson').then(r=>r.json()).then(d=>{window._ccData=d;}),
          window._assemblyData ? Promise.resolve() : fetch('data/state-assembly-districts.geojson').then(r=>r.json()).then(d=>{window._assemblyData=d;}),
          window._senateData ? Promise.resolve() : fetch('data/state-senate-districts.geojson').then(r=>r.json()).then(d=>{window._senateData=d;}),
          window._congressData ? Promise.resolve() : fetch('data/congressional-districts.geojson').then(r=>r.json()).then(d=>{window._congressData=d;}),
        ]).then(function(){ showCBDistricts(f); });
      });
    }
  });
  cdsLayer.addTo(map);
}

// Overlay loaders
var overlayLoaded = {};
function loadOverlay(name, url, builder){
  if(overlayLoaded[name]) return;
  overlayLoaded[name] = true;
  fetch(url).then(r=>r.json()).then(d=>builder(d)).catch(e=>console.log(name,'load failed',e));
}

// Legislative layers
var COUNCIL_COLORS = ['#0d7490','#0e8aac','#0f9ec8','#10b2e4','#12c6ff','#0ea5c8'];
var ASSEMBLY_COLORS = ['#1a7a4a','#1e8f56','#22a562','#26ba6e','#2acf7a'];
var SENATE_COLORS = ['#6b21a8','#7c2dc4','#8e39e0','#a045fc'];
var CONGRESS_COLORS = ['#b91c1c','#d42020','#f02424','#ff3030'];

function buildCC(d){
  const nums = [...new Set(d.features.map(f=>f.properties.CounDist))].sort((a,b)=>a-b);
  ccLayer = L.geoJSON(d,{
    style:f=>{const i=nums.indexOf(f.properties.CounDist)%COUNCIL_COLORS.length;return {color:'#fff',weight:1,fillColor:COUNCIL_COLORS[i],fillOpacity:.35};},
    onEachFeature:(f,l)=>{l.bindTooltip('<strong>City Council District '+f.properties.CounDist+'</strong>',{sticky:true});}
  });
  if(subState.cc) ccLayer.addTo(map);
}
function buildAssembly(d){
  const nums = [...new Set(d.features.map(f=>f.properties.assembly_district))].sort((a,b)=>a-b);
  assemblyLayer = L.geoJSON(d,{
    style:f=>{const i=nums.indexOf(f.properties.assembly_district)%ASSEMBLY_COLORS.length;return {color:'#fff',weight:1,fillColor:ASSEMBLY_COLORS[i],fillOpacity:.35};},
    onEachFeature:(f,l)=>{l.bindTooltip('<strong>Assembly District '+f.properties.assembly_district+'</strong>',{sticky:true});}
  });
  if(subState.assembly) assemblyLayer.addTo(map);
}
function buildSenate(d){
  const nums = [...new Set(d.features.map(f=>f.properties.st_sen_dist))].sort((a,b)=>a-b);
  senateLayer = L.geoJSON(d,{
    style:f=>{const i=nums.indexOf(f.properties.st_sen_dist)%SENATE_COLORS.length;return {color:'#fff',weight:1,fillColor:SENATE_COLORS[i],fillOpacity:.35};},
    onEachFeature:(f,l)=>{l.bindTooltip('<strong>State Senate District '+f.properties.st_sen_dist+'</strong>',{sticky:true});}
  });
  if(subState.senate) senateLayer.addTo(map);
}
function buildCongress(d){
  const nums = [...new Set(d.features.map(f=>f.properties.cong_dist))].sort((a,b)=>a-b);
  congressLayer = L.geoJSON(d,{
    style:f=>{const i=nums.indexOf(f.properties.cong_dist)%CONGRESS_COLORS.length;return {color:'#fff',weight:1,fillColor:CONGRESS_COLORS[i],fillOpacity:.35};},
    onEachFeature:(f,l)=>{l.bindTooltip('<strong>Congressional District NY-'+f.properties.cong_dist+'</strong>',{sticky:true});}
  });
  if(subState.congress) congressLayer.addTo(map);
}
function buildRents(d){
  const vals=d.features.map(f=>f.properties.Studio||f.properties.rent_studio||0).filter(v=>v>0);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  rentsLayer = L.geoJSON(d,{
    style:f=>{const v=f.properties.Studio||f.properties.rent_studio||0;const t=(v-mn)/(mx-mn||1);return {fillColor:`hsl(${220-t*180},70%,${65-t*25}%)`,weight:1,color:'rgba(255,255,255,.3)',fillOpacity:.65};},
    onEachFeature:(f,l)=>{const v=f.properties.Studio||f.properties.rent_studio||0;l.bindTooltip('CB '+f.properties.cb_code+'<br>Studio: $'+v,{sticky:true});}
  });
  if(subState.rents) rentsLayer.addTo(map);
}

function toggleOverlay(name, on){
  subState[name]=on;
  // Lazy load
  const loaders = {
    nypd:()=>loadOverlay('nypd','data/nypd_sectors.geojson',buildNYPD),
    fire:()=>loadOverlay('fire','data/fire_battalions.geojson',buildFire),
    subway:()=>loadOverlay('subway','data/nyc-subway-stations.geojson',buildSubway),
    citibike:()=>loadOverlay('citibike','data/citibike_stations_cb6.geojson',buildCitibike),
    parks:()=>loadOverlay('parks','data/bkcb6-parks.geojson',buildParks),
    gowanus:()=>loadOverlay('gowanus','data/Gowanus-Rezoning-Boundary-2.geojson',buildGowanus),
    rents:()=>loadOverlay('rents','data/citywide-rents.geojson',buildRents),
    cc:()=>loadOverlay('cc','data/city-council-districts.geojson',buildCC),
    assembly:()=>loadOverlay('assembly','data/state-assembly-districts.geojson',buildAssembly),
    senate:()=>loadOverlay('senate','data/state-senate-districts.geojson',buildSenate),
    congress:()=>loadOverlay('congress','data/congressional-districts.geojson',buildCongress),
  };
  if(on && loaders[name]) loaders[name]();
  const lyrMap = {nypd:nypdLayer,fire:fireLayer,subway:subwayLayer,citibike:citibikeLayer,parks:parksLayer,gowanus:gowanusLayer,rents:rentsLayer,cc:ccLayer,assembly:assemblyLayer,senate:senateLayer,congress:congressLayer};
  if(!on && lyrMap[name]) map.removeLayer(lyrMap[name]);
}

// ── SET MAIN ──
function setMain(which, btn){
  activeMain = which;
  document.querySelectorAll('.plyr-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  // Remove CDs layer when leaving multi-CB views
  if(which==='cb6'||which==='brooklyn'||which==='manhattan'||which==='queens'||which==='bronx'||which==='si'){
    if(which!=='cb6'&&cdsLayer) cdsLayer.addTo(map);
    else if(cdsLayer) map.removeLayer(cdsLayer);
  }
  if(which==='nyc' && cdsData) buildCDLayer();
  else if(which==='nyc') loadCDs();

  // Fly to view
  const v = BORO_VIEWS[which]||[40.6771,-74.0012,13];
  map.setView([v[0],v[1]],v[2]);

  // For borough views, load and show all CDs
  if(['brooklyn','manhattan','queens','bronx','si','nyc'].includes(which)) loadCDs();
  else if(cdsLayer) map.removeLayer(cdsLayer);

  buildSubToggles();
  updateLegend();
}

// ── SUB TOGGLES ──
function buildSubToggles(){
  const sub = document.getElementById('sub-row');
  sub.innerHTML='';
  sub.style.background='#f5f0e8';

  const overlays = [
    {k:'nypd',c:'#6b21a8',tc:'#fff',l:'👮 NYPD Sectors'},
    {k:'fire',c:'#ea580c',tc:'#fff',l:'🚒 Fire Battalions'},
    {k:'subway',c:'#1d4ed8',tc:'#fff',l:'🚇 Subway'},
    {k:'citibike',c:'#0052a5',tc:'#fff',l:'🚲 Citibike'},
    {k:'parks',c:'#16a34a',tc:'#fff',l:'🌳 Parks'},
    {k:'gowanus',c:'#0d9488',tc:'#fff',l:'🌊 Gowanus'},
    {k:'rents',c:'#dc2626',tc:'#fff',l:'🏠 Rents'},
  ];

  // Legislative — defined below

  if(activeMain==='cb6'){
    // CB6-specific layers
    overlays.forEach(item=>{
      const btn=document.createElement('button');
      btn.className='plyr-sub'+(subState[item.k]?' on':'');
      btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc',item.tc);
      btn.textContent=item.l;
      btn.onclick=()=>{subState[item.k]=!subState[item.k];btn.classList.toggle('on');toggleOverlay(item.k,subState[item.k]);updateLegend();};
      sub.appendChild(btn);
    });
  } else {
    // Non-CB6 views — all overlays + legislative placeholders
    overlays.slice(0,5).forEach(item=>{
      const btn=document.createElement('button');
      btn.className='plyr-sub'+(subState[item.k]?' on':'');
      btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc',item.tc||'#fff');
      btn.textContent=item.l;
      btn.onclick=()=>{subState[item.k]=!subState[item.k];btn.classList.toggle('on');toggleOverlay(item.k,subState[item.k]);updateLegend();};
      sub.appendChild(btn);
    });
    overlays.slice(6).forEach(item=>{
      const btn=document.createElement('button');
      btn.className='plyr-sub'+(subState[item.k]?' on':'');
      btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc',item.tc||'#fff');
      btn.textContent=item.l;
      btn.onclick=()=>{subState[item.k]=!subState[item.k];btn.classList.toggle('on');toggleOverlay(item.k,subState[item.k]);updateLegend();};
      sub.appendChild(btn);
    });
  }

  // Legislative layers - now enabled
  const legislative = [
    {k:'cc',c:'#0d7490',l:'🏙 City Council'},
    {k:'assembly',c:'#1a7a4a',l:'🏛 Assembly'},
    {k:'senate',c:'#6b21a8',l:'⚖️ Senate'},
    {k:'congress',c:'#b91c1c',l:'🇺🇸 Congress'},
  ];
  legislative.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='plyr-sub'+(subState[item.k]?' on':'');
    btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc','#fff');
    btn.textContent=item.l;
    btn.onclick=()=>{subState[item.k]=!subState[item.k];btn.classList.toggle('on');toggleOverlay(item.k,subState[item.k]);updateLegend();};
    sub.appendChild(btn);
  });
}

// ── LEGEND ──
function updateLegend(){
  let html='';
  const active = Object.keys(subState).filter(k=>subState[k]);
  const labels = {nypd:['#6b21a8','NYPD Sectors'],fire:['#ea580c','Fire Battalions'],subway:['#1d4ed8','Subway'],citibike:['#0052a5','Citibike'],parks:['#16a34a','Parks'],gowanus:['#0d9488','Gowanus'],rents:['#dc2626','Rents'],cc:['#0d7490','City Council'],assembly:['#1a7a4a','Assembly'],senate:['#6b21a8','State Senate'],congress:['#b91c1c','Congress']};
  if(['brooklyn','manhattan','queens','bronx','si','nyc'].includes(activeMain)){
    const boroKey = {brooklyn:'3',manhattan:'1',queens:'4',bronx:'2',si:'5'};
    const bk = boroKey[activeMain];
    if(bk) html+=`<span class="li"><span class="ls" style="background:${BORO_COLORS[bk]}"></span>${BORO_NAMES[bk]} CBs</span>`;
    else {Object.entries(BORO_COLORS).forEach(([k,c])=>{ html+=`<span class="li"><span class="ls" style="background:${c}"></span>${BORO_NAMES[k]}</span>`; }); }
  } else {
    html+='<span class="li"><span class="ls" style="background:#f47920;border-radius:0"></span>CB6</span>';
  }
  active.forEach(k=>{ if(labels[k]) html+=`<span class="li"><span class="ls" style="background:${labels[k][0]}"></span>${labels[k][1]}</span>`; });
  document.getElementById('legend').innerHTML=html;
}

buildSubToggles();

// ── AUTOCOMPLETE ──
let _acT=null;
async function doAC(val){
  clearTimeout(_acT);
  const drop=document.getElementById('ac-drop');
  if(!val||val.length<4){drop.style.display='none';return;}
  _acT=setTimeout(async()=>{
    try{
      const boro=document.getElementById('boro-sel').value;
      const boroQ=boro!=='Citywide'?` ${boro} New York`:' New York City';
      const r=await fetch(`https://geosearch.planninglabs.nyc/v2/autocomplete?text=${encodeURIComponent(val+boroQ)}&size=6`);
      const d=await r.json();
      drop.innerHTML='';
      (d.features||[]).forEach(f=>{
        const label=f.properties.label||'';
        if(!label.toLowerCase().includes('new york'))return;
        const item=document.createElement('div');
        item.textContent=label;
        item.onmousedown=()=>{
          document.getElementById('s-input').value=label.replace(/, New York, NY.*$/i,'');
          drop.style.display='none';
          doSearch();
        };
        drop.appendChild(item);
      });
      drop.style.display=drop.children.length?'block':'none';
    }catch(e){document.getElementById('ac-drop').style.display='none';}
  },200);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-row'))document.getElementById('ac-drop').style.display='none';});

// ── SEARCH ──
function pRow(icon,label,val){return'<tr style="border-bottom:1px solid #f0efed"><td style="padding:6px 10px 6px 0;vertical-align:top;white-space:nowrap"><span style="font-size:.85rem">'+icon+'</span><span style="font-size:.63rem;font-family:DM Mono,monospace;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-left:4px">'+label+'</span></td><td style="padding:6px 0;font-size:.78rem;color:#0d1b4b;line-height:1.4">'+val+'</td></tr>';}

async function doSearch(){
  const addr=document.getElementById('s-input').value.trim();
  const boro=document.getElementById('boro-sel').value;
  if(!addr)return;
  document.getElementById('ac-drop').style.display='none';
  const res=document.getElementById('s-result');
  res.style.display='block';
  res.innerHTML='<span style="color:#888;font-size:.78rem;font-family:DM Mono,monospace">Searching…</span>';

  const KEY='b913bdfb9c47466589d0f08c99c75b21';
  const m=addr.match(/^(\d+[-\d]*)\s+(.+)$/);
  let lat=null,lng=null,lbl=addr,gcData=null;

  if(m){
    const boros=boro==='Citywide'?['Brooklyn','Manhattan','Queens','Bronx','Staten Island']:[boro];
    for(const b of boros){
      try{
        const r=await fetch(`https://api.nyc.gov/geoclient/v2/address.json?houseNumber=${encodeURIComponent(m[1])}&street=${encodeURIComponent(m[2])}&borough=${encodeURIComponent(b)}&subscription-key=${KEY}`);
        const d=await r.json();
        if(d.address&&!d.address.message&&d.address.latitude){gcData=d.address;lat=parseFloat(d.address.latitude);lng=parseFloat(d.address.longitude);break;}
      }catch(e){}
    }
  }

  if(!lat){
    try{
      const boroQ=boro!=='Citywide'?` ${boro} New York`:' New York City';
      const r=await fetch(`https://geosearch.planninglabs.nyc/v2/search?text=${encodeURIComponent(addr+boroQ)}&size=1`);
      const d=await r.json();
      if(d.features&&d.features.length){const f=d.features[0];lat=f.geometry.coordinates[1];lng=f.geometry.coordinates[0];lbl=f.properties.label||addr;}
    }catch(e){}
  }

  if(!lat){res.innerHTML='<span style="color:#c81e1e;font-size:.78rem">Address not found.</span>';return;}

  if(searchMarker)map.removeLayer(searchMarker);
  searchMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#f47920',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(`<b>${escH(gcData?gcData.houseNumber+' '+gcData.firstStreetNameNormalized:addr)}</b>`).openPopup();
  map.setView([lat,lng],16);

  let html='<div style="font-family:DM Sans,sans-serif;font-weight:700;font-size:.82rem;color:#0d1b4b;margin-bottom:6px">'+escH(lbl)+'</div><table style="border-collapse:collapse;width:100%;font-size:.78rem">';
  if(gcData){
    if(gcData.communityDistrict) html+=pRow('🗂','Community Board','CB '+parseInt(gcData.communityDistrict)%100);
    if(gcData.cityCouncilDistrict) html+=pRow('🏙','City Council','District '+gcData.cityCouncilDistrict);
    if(gcData.stateLegislativeDistrict||gcData.assemblyDistrict) html+=pRow('🏛','Assembly','AD '+(gcData.stateLegislativeDistrict||gcData.assemblyDistrict));
    if(gcData.stateSenatorialDistrict) html+=pRow('⚖️','State Senate','SD '+gcData.stateSenatorialDistrict);
    if(gcData.congressionalDistrict) html+=pRow('🇺🇸','Congress','NY-'+gcData.congressionalDistrict);
    if(gcData.zipCode) html+=pRow('📮','ZIP',gcData.zipCode);
  }
  html+='<tr><td colspan="2" style="padding:6px 0"><a href="mydistricts.html?address='+encodeURIComponent(addr)+(boro!=='Citywide'?'&borough='+encodeURIComponent(boro):'')+'\" target="_blank" style="color:#f47920;font-size:.72rem;font-family:DM Mono,monospace;font-weight:700">Full district breakdown ↗</a></td></tr>';
  html+='</table>';
  res.style.cssText='display:block;padding:10px 14px;background:#fff;border-bottom:2px solid #f47920;flex-shrink:0';
  res.innerHTML=html;
}
