<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKCB6 — Land Use Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1b4b}
body{display:flex;flex-direction:column}
.top-bar{background:#0d1b4b;border-bottom:3px solid #f47920;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.top-bar h1{font-size:.92rem;font-weight:700;color:#fff;white-space:nowrap}
.top-bar h1 span{color:#f47920}
.search-row{display:flex;gap:6px;flex:1;min-width:180px}
.search-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:.83rem;padding:6px 11px;border:none;border-radius:6px;background:rgba(255,255,255,.12);color:#fff;outline:none}
.search-row input::placeholder{color:rgba(255,255,255,.4)}
.search-row button{padding:6px 14px;background:#f47920;color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.back-link{font-size:.7rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap}
.back-link:hover{color:#f47920}
.addr-result{display:none;padding:10px 14px;background:#fff;border-bottom:2px solid #f47920;flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:.82rem}
.sub-row{padding:7px 14px;background:#fff8f0;border-bottom:1px solid #f0e6d0;display:flex;flex-wrap:wrap;gap:5px;align-items:center;flex-shrink:0}
.sub-row span{font-size:.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-right:2px}
.lbtn{padding:4px 10px;font-size:.71rem;font-family:'DM Sans',sans-serif;font-weight:600;border:1.5px solid #ccc;border-radius:16px;cursor:pointer;transition:all .15s}
.lbtn.on{background:var(--sc);color:var(--tc,#fff);border-color:var(--sc)}
.lbtn.off{background:#fff;color:#555}
.legend-bar{padding:5px 14px;background:#fafaf8;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:7px;align-items:center;flex-shrink:0}
.li{display:inline-flex;align-items:center;gap:4px;font-size:.71rem;color:#444}
.ls{display:inline-block;width:14px;height:10px;border-radius:2px}
#map{flex:1;min-height:300px}
.note-bar{padding:4px 14px;font-size:.65rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.35);background:#0d1b4b;flex-shrink:0}
.note-bar a{color:#f47920;text-decoration:none}
</style>
</head>
<body>
<div class="top-bar">
  <h1>BKCB6 <span>Land Use Map</span></h1>
  <div class="search-row">
    <input id="s-input" type="text" placeholder="Search a CB6 address…"/>
    <button onclick="doSearch()">Search</button>
  </div>
  <a class="back-link" href="cb-bk-6.html">← Back to CB6</a>
</div>
<div class="addr-result" id="s-result"></div>
<div class="sub-row">
  <span>Use group</span>
  <button class="lbtn on" onclick="tog('01',this)" style="--sc:#FEFFA8;--tc:#333">1-2 Fam</button>
  <button class="lbtn on" onclick="tog('02',this)" style="--sc:#FCB842">Walk-Up MF</button>
  <button class="lbtn on" onclick="tog('03',this)" style="--sc:#B16E00">Elevator MF</button>
  <button class="lbtn on" onclick="tog('04',this)" style="--sc:#ff8341">Mixed</button>
  <button class="lbtn on" onclick="tog('05',this)" style="--sc:#fc2929">Commercial</button>
  <button class="lbtn on" onclick="tog('06',this)" style="--sc:#E362FB">Industrial</button>
  <button class="lbtn on" onclick="tog('07',this)" style="--sc:#E0BEEB;--tc:#333">Transport</button>
  <button class="lbtn on" onclick="tog('08',this)" style="--sc:#44A3D5">Public</button>
  <button class="lbtn on" onclick="tog('09',this)" style="--sc:#78D271;--tc:#333">Open Space</button>
  <button class="lbtn on" onclick="tog('10',this)" style="--sc:#BAB8B6;--tc:#333">Parking</button>
  <button class="lbtn on" onclick="tog('11',this)" style="--sc:#555">Vacant</button>
</div>
<div class="legend-bar" id="legend"></div>
<div id="map"></div>
<div class="note-bar" id="note">Loading land use data… &nbsp;|&nbsp; <a href="cb-bk-6.html">Back to CB6 ↗</a></div>

<script>
var map = L.map('map',{scrollWheelZoom:true}).setView([40.671,-73.990],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

var COLORS = {'01':'#FEFFA8','02':'#FCB842','03':'#B16E00','04':'#ff8341','05':'#fc2929','06':'#E362FB','07':'#E0BEEB','08':'#44A3D5','09':'#78D271','10':'#BAB8B6','11':'#555555'};
var LABELS = {'01':'1-2 Family','02':'Walk-Up MF','03':'Elevator MF','04':'Mixed Res/Comm','05':'Commercial','06':'Industrial','07':'Transportation','08':'Public Facilities','09':'Open Space','10':'Parking','11':'Vacant'};
var vis = {'01':true,'02':true,'03':true,'04':true,'05':true,'06':true,'07':true,'08':true,'09':true,'10':true,'11':true};
var luLayer = null, boundaryLayer = null, searchMarker = null;

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function normLU(v){var s=String(v==null?'':v).replace(/\.0+$/,'');return s.length===1?'0'+s:s;}
function tog(k,btn){vis[k]=!vis[k];btn.classList.toggle('on');btn.classList.toggle('off');if(luLayer){luLayer.eachLayer(function(l){var c=normLU(l.feature&&l.feature.properties&&l.feature.properties.land_use_code);l.setStyle({fillOpacity:vis[c]?.78:0});});}}
function updateLegend(){document.getElementById('legend').innerHTML=Object.keys(LABELS).map(function(k){return'<span class="li"><span class="ls" style="background:'+COLORS[k]+'"></span>'+LABELS[k]+'</span>';}).join('');}

Promise.all([
  fetch('data/cb6-landuse-lots.geojson').then(function(r){return r.json();}),
  fetch('data/cb6-boundary-kml.geojson').then(function(r){return r.json();})
]).then(function(res){
  var luData=res[0], bndData=res[1];

  boundaryLayer = L.geoJSON(bndData,{style:function(){return{color:'#f47920',weight:2.5,fill:false};}}).addTo(map);
  map.fitBounds(boundaryLayer.getBounds(),{padding:[18,18]});

  luLayer = L.geoJSON(luData,{
    pointToLayer:function(f,latlng){
      var c = normLU(f.properties.land_use_code);
      return L.circleMarker(latlng,{
        radius:4,
        fillColor:COLORS[c]||'#9aa0a6',
        fillOpacity:vis[c]?.78:0,
        color:'#fff',
        weight:.5
      });
    },
    onEachFeature:function(f,l){
      var p=f.properties;
      var c=normLU(p.land_use_code);
      l.bindTooltip(
        '<strong>'+(LABELS[c]||'Unknown')+'</strong>'+
        '<br><span style="font-size:.75rem;color:#333">'+(p.address||'')+'</span>'+
        (p.owner?'<br><span style="font-size:.72rem;color:#888">'+escH(p.owner)+'</span>':'')+
        (p.zoning?'<br><span style="font-size:.72rem;color:#555">Zone: '+escH(p.zoning)+'</span>':'')+
        (p.year_built?'<br><span style="font-size:.72rem;color:#888">Built: '+p.year_built+'</span>':''),
        {sticky:true,opacity:1}
      );
    }
  }).addTo(map);
  boundaryLayer.bringToFront();
  document.getElementById('note').textContent = luData.features.length+' lots loaded. Toggle use groups above.';
  updateLegend();
}).catch(function(e){
  document.getElementById('note').textContent = 'Load error: '+e;
});

function pRow(icon,label,val){return'<tr style="border-bottom:1px solid #f0efed"><td style="padding:5px 10px 5px 0;white-space:nowrap"><span style="font-size:.85rem">'+icon+'</span><span style="font-size:.63rem;font-family:DM Mono,monospace;text-transform:uppercase;color:#888;margin-left:4px">'+label+'</span></td><td style="padding:5px 0;font-size:.78rem;color:#0d1b4b">'+val+'</td></tr>';}

function doSearch(){
  var addr=document.getElementById('s-input').value.trim();if(!addr)return;
  var res=document.getElementById('s-result');res.style.display='block';res.innerHTML='Searching…';
  fetch('https://geosearch.planninglabs.nyc/v2/search?text='+encodeURIComponent(addr)+'&size=1')
    .then(function(r){return r.json();}).then(function(geo){
      if(!geo.features||!geo.features.length){res.innerHTML='Address not found.';return;}
      var feat=geo.features[0],lat=feat.geometry.coordinates[1],lng=feat.geometry.coordinates[0],lbl=feat.properties.label||addr;
      // Find matching lot in local data
      var match=null,minDist=999;
      if(luLayer){luLayer.eachLayer(function(l){if(!l.getLatLng)return;var ll=l.getLatLng();var d=Math.abs(ll.lat-lat)+Math.abs(ll.lng-lng);if(d<minDist){minDist=d;match=l;}});}
      if(searchMarker)map.removeLayer(searchMarker);
      var p=match?match.feature.properties:{};
      var c=normLU(p.land_use_code);
      var card='<div style="font-family:DM Sans,sans-serif;min-width:220px"><div style="font-weight:700;font-size:.85rem;color:#0d1b4b;border-bottom:2px solid #f47920;padding-bottom:4px;margin-bottom:6px">📍 '+escH(lbl)+'</div><table style="border-collapse:collapse;width:100%">'+pRow('🏘','Land Use',escH(LABELS[c]||'Unknown'))+(p.zoning?pRow('🧭','Zoning',escH(p.zoning)):'')+( p.owner?pRow('🏢','Owner',escH(p.owner)):'')+( p.year_built?pRow('📅','Year Built',p.year_built):'')+( p.num_floors?pRow('🏗','Floors',p.num_floors):'')+( p.units_res?pRow('🏠','Res Units',p.units_res):'')+'</table></div>';
      searchMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="background:#fff;border:2px solid #f47920;border-radius:8px;padding:10px 12px;box-shadow:0 4px 20px rgba(0,0,0,.25)">'+card+'</div>',iconSize:[260,1],iconAnchor:[0,0]}),zIndexOffset:9999}).addTo(map);
      map.setView([lat,lng],16);
      res.innerHTML='<strong>'+escH(lbl)+'</strong> — '+escH(LABELS[c]||'Unknown')+(p.zoning?' · Zone: <strong>'+escH(p.zoning)+'</strong>':'');
    }).catch(function(){res.innerHTML='Search failed.';});
}
document.getElementById('s-input').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
updateLegend();
</script>
</body>
</html>
