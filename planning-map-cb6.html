<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKCB6 — Land Use, Zoning & Landmarks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1b4b}
body{display:flex;flex-direction:column}
.top-bar{background:#0d1b4b;border-bottom:3px solid #f47920;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.top-bar h1{font-size:.92rem;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.top-bar h1 span{color:#f47920}
.search-row{display:flex;gap:6px;flex:1;min-width:180px}
.search-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:.83rem;padding:6px 11px;border:none;border-radius:6px;background:rgba(255,255,255,.12);color:#fff;outline:none}
.search-row input::placeholder{color:rgba(255,255,255,.4)}
.search-row button{padding:6px 14px;background:#f47920;color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.back-link{font-size:.7rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap}
.back-link:hover{color:#f47920}
.addr-result{display:none;padding:10px 14px;background:#fff;border-bottom:2px solid #f47920;flex-shrink:0}
.layer-bar{padding:8px 14px;background:#0d1b4b;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.layer-bar span{font-size:.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-right:2px}
.lbtn{padding:5px 14px;font-size:.78rem;font-family:'DM Sans',sans-serif;font-weight:700;border:1.5px solid rgba(255,255,255,.3);border-radius:20px;background:transparent;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;white-space:nowrap}
.lbtn.active{background:var(--pc);border-color:var(--pc);color:#fff}
.sub-bar{padding:7px 14px;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:5px;align-items:center;flex-shrink:0;background:#f8f7f4}
.sbtn{padding:4px 10px;font-size:.71rem;font-family:'DM Sans',sans-serif;font-weight:600;border:1.5px solid #ccc;border-radius:16px;background:#fff;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
.sbtn.on{background:var(--sc);color:var(--stc,#fff);border-color:var(--sc)}
.legend-bar{padding:5px 14px;background:#fafaf8;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:7px;align-items:center;flex-shrink:0;min-height:26px}
.li{display:inline-flex;align-items:center;gap:4px;font-size:.71rem;color:#444}
.ls{display:inline-block;width:14px;height:10px;border-radius:2px}
#map{flex:1;min-height:300px}
.note-bar{padding:4px 14px;font-size:.65rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.3);background:#0d1b4b;flex-shrink:0}
.note-bar a{color:#f47920;text-decoration:none}
</style>
</head>
<body>
<div class="top-bar">
  <h1>BKCB6 <span>Land Use, Zoning &amp; Landmarks</span></h1>
  <div class="search-row">
    <input id="s-input" type="text" placeholder="Search a CB6 address…"/>
    <button onclick="doSearch()">Search</button>
  </div>
  <a class="back-link" href="cb-bk-6.html">← Back</a>
</div>
<div class="addr-result" id="s-result"></div>

<div class="layer-bar">
  <span>Layer</span>
  <button class="lbtn active" onclick="setLayer('zoning',this)" style="--pc:#4c78a8">🧭 Zoning</button>
  <button class="lbtn" onclick="setLayer('landuse',this)" style="--pc:#f4a261">🏘 Land Use</button>
  <button class="lbtn" onclick="setLayer('landmarks',this)" style="--pc:#b5862b">🏛 Landmarks</button>
</div>

<div class="sub-bar" id="sub-bar"></div>
<div class="legend-bar" id="legend"></div>
<div id="map"></div>
<div class="note-bar" id="note">Loading… &nbsp;|&nbsp; <a href="cb-bk-6.html">Back to CB6 profile ↗</a></div>

<script>
var map = L.map('map',{scrollWheelZoom:true}).setView([40.671,-73.990],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

var activeLayer = 'zoning';
var boundaryLayer = null;
var zoningLayer = null, zoningData = null;
var luLayer = null, luLoading = false;
var lmLayer = null, lmData = null;
var searchMarker = null;

var ZONE_COLORS = {R:'#f4a261',C:'#4c78a8',M:'#7b61ff',P:'#66a61e',O:'#9aa0a6'};
var LU_COLORS = {'01':'#FEFFA8','02':'#FCB842','03':'#B16E00','04':'#ff8341','05':'#fc2929','06':'#E362FB','07':'#E0BEEB','08':'#44A3D5','09':'#78D271','10':'#BAB8B6','11':'#555555'};
var LU_LABELS = {'01':'1-2 Family','02':'Walk-Up MF','03':'Elevator MF','04':'Mixed','05':'Commercial','06':'Industrial','07':'Transportation','08':'Public','09':'Open Space','10':'Parking','11':'Vacant'};
var LM_PAL = ['#b5862b','#8b5e2a','#c4973b','#7a5c1e','#d4a843','#6b4f1a','#e0b84f','#5c4216'];

var zoningVis = {R:true,C:true,M:true,P:true,O:true};
var luVis = {'01':true,'02':true,'03':true,'04':true,'05':true,'06':true,'07':true,'08':true,'09':true,'10':true,'11':true};
var lmVis = {};

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getZLbl(p){return p.zonedist||p.ZONEDIST||p.zone_dist||p.label||'Unknown';}
function getZCat(l){var c=String(l||'').toUpperCase().trim();if(c.indexOf('PARK')!==-1)return'P';if(c[0]==='M')return'M';if(c[0]==='C')return'C';if(c[0]==='R')return'R';return'O';}
function normZ(l){var c=String(l||'').toUpperCase().trim();if(/^[RCM]\d[A-Z]?$/.test(c))return c[0]+'-'+c.slice(1);return c;}
function normLU(v){var s=String(v==null?'':v).replace(/\.0+$/,'');return s.length===1?'0'+s:s;}
function walkC(c,b){if(!Array.isArray(c))return;if(typeof c[0]==='number'){b.minLat=Math.min(b.minLat,c[1]);b.maxLat=Math.max(b.maxLat,c[1]);b.minLng=Math.min(b.minLng,c[0]);b.maxLng=Math.max(b.maxLng,c[0]);return;}c.forEach(function(p){walkC(p,b);});}
function pip(lng,lat,feat){var g=feat.geometry;if(!g)return false;var rings=g.type==='Polygon'?[g.coordinates]:g.coordinates;for(var p=0;p<rings.length;p++){var o=rings[p][0],ins=false;for(var i=0,j=o.length-1;i<o.length;j=i++){var xi=o[i][0],yi=o[i][1],xj=o[j][0],yj=o[j][1];if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))ins=!ins;}if(ins)return true;}return false;}

// Load boundary + zoning + landmarks on init
fetch('nyc_cb_boundaries.geojson').then(function(r){return r.json();}).then(function(bd){
  var cb6=(bd.features||[]).find(function(f){return String(f.properties&&f.properties.boro_cd)==='306';});
  if(!cb6) return;
  boundaryLayer=L.geoJSON(cb6,{style:function(){return{color:'#f47920',weight:2.5,fill:false};}}).addTo(map);
  map.fitBounds(boundaryLayer.getBounds(),{padding:[18,18]});
  var g=cb6.geometry.coordinates,b={minLat:90,maxLat:-90,minLng:180,maxLng:-180};
  walkC(g,b);
  var env={xmin:b.minLng,ymin:b.minLat,xmax:b.maxLng,ymax:b.maxLat,spatialReference:{wkid:4326}};
  fetch('https://services5.arcgis.com/GfwWNkhOj9bNBqoJ/arcgis/rest/services/nyzd/FeatureServer/0/query?where=1%3D1&outFields=*&returnGeometry=true&outSR=4326&geometry='+encodeURIComponent(JSON.stringify(env))+'&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&f=pgeojson')
    .then(function(r){return r.json();}).then(function(d){
      zoningData=d;
      buildZoningLayer();
      if(activeLayer==='zoning') zoningLayer.addTo(map);
      document.getElementById('note').textContent='Hover any district for details. Use the Layer buttons to switch views.';
    });
});

fetch('historic_districts_by_cb_files/bk_cb6_historic_districts.geojson').then(function(r){return r.json();}).then(function(d){
  lmData=d;
  (d.features||[]).forEach(function(f,i){var n=f.properties.area_name||'District '+(i+1);lmVis[n]=true;});
  buildLmLayer();
});

function buildZoningLayer(){
  if(zoningLayer)map.removeLayer(zoningLayer);
  zoningLayer=L.geoJSON(zoningData,{
    style:function(f){var l=getZLbl(f.properties||{});var c=getZCat(l);return{color:'#fff',weight:.8,fillColor:ZONE_COLORS[c],fillOpacity:zoningVis[c]?.6:0};},
    onEachFeature:function(f,l){
      var lb=getZLbl(f.properties||{});
      l.bindTooltip('<strong>'+normZ(lb)+'</strong>',{sticky:true,opacity:1});
      l.on('mouseover',function(){l.setStyle({weight:1.8,fillOpacity:.88});});
      l.on('mouseout',function(){zoningLayer.resetStyle(l);});
    }
  });
  if(activeLayer==='zoning'){zoningLayer.addTo(map);if(boundaryLayer)boundaryLayer.bringToFront();}
  updateLegend();
}

function buildLmLayer(){
  if(lmLayer)map.removeLayer(lmLayer);
  var names=Object.keys(lmVis);
  lmLayer=L.geoJSON(lmData,{
    style:function(f){var n=f.properties.area_name||'';var i=names.indexOf(n);var c=LM_PAL[i%LM_PAL.length];return{color:c,weight:2.5,fillColor:c,fillOpacity:lmVis[n]?.28:0,opacity:lmVis[n]?1:0};},
    onEachFeature:function(f,l){
      var n=f.properties.area_name||'';
      l.bindTooltip('<strong>'+escH(n)+'</strong><br><span style="font-size:.75rem;color:#555">LPC Historic District</span>',{sticky:true,opacity:1});
      l.on('mouseover',function(){l.setStyle({fillOpacity:.5,weight:3});});
      l.on('mouseout',function(){buildLmLayer();});
    }
  });
  if(activeLayer==='landmarks'){lmLayer.addTo(map);if(boundaryLayer)boundaryLayer.bringToFront();}
  updateLegend();
}

function loadLandUse(){
  if(luLayer||luLoading) return;
  luLoading=true;
  var note=document.getElementById('note');
  if(note)note.textContent='Loading all CB6 parcels…';
  // Use exact CB6 boundary polygon
  fetch('data/cb6_boundary_exact.geojson').then(function(r){return r.json();}).then(function(bnd){
    var feat=bnd.features?bnd.features[0]:bnd;
    var ring=feat.geometry.coordinates[0];
    var geomStr=JSON.stringify({rings:[ring],spatialReference:{wkid:4326}});
    var allFeats=[];
    function fetchPage(offset){
      if(note)note.textContent='Loading parcels… '+allFeats.length+' loaded';
      fetch('https://services5.arcgis.com/GfwWNkhOj9bNBqoJ/arcgis/rest/services/MAPPLUTO/FeatureServer/0/query?where=1%3D1&geometry='+encodeURIComponent(geomStr)+'&geometryType=esriGeometryPolygon&inSR=4326&spatialRel=esriSpatialRelContains&outFields=LandUse,Address,BBL&returnGeometry=true&f=geojson&resultRecordCount=2000&resultOffset='+offset+'&outSR=4326')
        .then(function(r){return r.json();}).then(function(d){
          var feats=d.features||[];
          allFeats=allFeats.concat(feats);
          if(feats.length===2000){fetchPage(offset+2000);}
          else{
            luLayer=L.geoJSON({type:'FeatureCollection',features:allFeats},{
              style:function(f){var c=normLU(f.properties&&f.properties.LandUse);return{fillColor:LU_COLORS[c]||'#9aa0a6',fillOpacity:luVis[c]?.78:0,color:'#fff',weight:.5};},
              onEachFeature:function(f,l){var c=normLU(f.properties&&f.properties.LandUse);l.bindTooltip('<strong>'+(LU_LABELS[c]||'Unknown')+'</strong><br><span style="font-size:.75rem;color:#555">'+(f.properties.Address||'')+'</span>',{sticky:true,opacity:1});}
            }).addTo(map);
            if(boundaryLayer)boundaryLayer.bringToFront();
            if(note)note.textContent=allFeats.length+' parcels loaded.';
            buildSubBar();
            updateLegend();
          }
        }).catch(function(){if(note)note.textContent='Could not load parcels.';});
    }
    fetchPage(0);
  });
}

function setLayer(which, btn){
  activeLayer=which;
  document.querySelectorAll('.lbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(zoningLayer)map.removeLayer(zoningLayer);
  if(luLayer)map.removeLayer(luLayer);
  if(lmLayer)map.removeLayer(lmLayer);
  if(which==='zoning'){
    if(zoningLayer)zoningLayer.addTo(map);
    document.getElementById('note').textContent='Zoning districts. Hover for code.';
  } else if(which==='landuse'){
    loadLandUse();
    if(luLayer)luLayer.addTo(map);
    document.getElementById('note').textContent=luLayer?'Land use parcels loaded.':'Loading CB6 parcels…';
  } else if(which==='landmarks'){
    if(lmLayer)lmLayer.addTo(map);
    document.getElementById('note').textContent='LPC historic districts. Hover for details.';
  }
  if(boundaryLayer)boundaryLayer.bringToFront();
  buildSubBar();
  updateLegend();
}

function buildSubBar(){
  var sub=document.getElementById('sub-bar');
  sub.innerHTML='';
  if(activeLayer==='zoning'){
    [{k:'R',c:'#f4a261',l:'Residential'},{k:'C',c:'#4c78a8',l:'Commercial'},{k:'M',c:'#7b61ff',l:'Manufacturing'},{k:'P',c:'#66a61e',l:'Parks'},{k:'O',c:'#9aa0a6',l:'Special'}].forEach(function(item){
      var btn=document.createElement('button');
      btn.className='sbtn'+(zoningVis[item.k]?' on':'');
      btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc','#fff');
      btn.textContent=item.l;
      btn.onclick=function(){zoningVis[item.k]=!zoningVis[item.k];btn.classList.toggle('on');if(zoningData)buildZoningLayer();if(activeLayer==='zoning'&&zoningLayer)zoningLayer.addTo(map);if(boundaryLayer)boundaryLayer.bringToFront();updateLegend();};
      sub.appendChild(btn);
    });
  } else if(activeLayer==='landuse'){
    [{c:'#FEFFA8',tc:'#333',l:'1-2 Fam',k:'01'},{c:'#FCB842',tc:'#fff',l:'Walk-Up MF',k:'02'},{c:'#B16E00',tc:'#fff',l:'Elevator MF',k:'03'},{c:'#ff8341',tc:'#fff',l:'Mixed',k:'04'},{c:'#fc2929',tc:'#fff',l:'Commercial',k:'05'},{c:'#E362FB',tc:'#fff',l:'Industrial',k:'06'},{c:'#44A3D5',tc:'#fff',l:'Public',k:'08'},{c:'#78D271',tc:'#fff',l:'Open Space',k:'09'},{c:'#BAB8B6',tc:'#333',l:'Parking',k:'10'},{c:'#555',tc:'#fff',l:'Vacant',k:'11'}].forEach(function(item){
      var btn=document.createElement('button');
      btn.className='sbtn'+(luVis[item.k]?' on':'');
      btn.style.setProperty('--sc',item.c);btn.style.setProperty('--stc',item.tc);
      btn.textContent=item.l;
      btn.onclick=function(){luVis[item.k]=!luVis[item.k];btn.classList.toggle('on');if(luLayer){luLayer.eachLayer(function(l){var c=normLU(l.feature&&l.feature.properties&&l.feature.properties.LandUse);l.setStyle({fillOpacity:luVis[c]?.78:0});});}updateLegend();};
      sub.appendChild(btn);
    });
  } else if(activeLayer==='landmarks'&&lmData){
    Object.keys(lmVis).forEach(function(name,i){
      var col=LM_PAL[i%LM_PAL.length];
      var btn=document.createElement('button');
      btn.className='sbtn'+(lmVis[name]?' on':'');
      btn.style.setProperty('--sc',col);btn.style.setProperty('--stc','#fff');
      btn.textContent=name.replace(' Historic District','').replace(' Extension',' Ext.');
      btn.title=name;
      btn.onclick=function(){lmVis[name]=!lmVis[name];btn.classList.toggle('on');buildLmLayer();if(activeLayer==='landmarks'&&lmLayer)lmLayer.addTo(map);if(boundaryLayer)boundaryLayer.bringToFront();updateLegend();};
      sub.appendChild(btn);
    });
  }
}

function updateLegend(){
  var html='';
  if(activeLayer==='zoning'){
    [{k:'R',c:'#f4a261',l:'Residential'},{k:'C',c:'#4c78a8',l:'Commercial'},{k:'M',c:'#7b61ff',l:'Manufacturing'},{k:'P',c:'#66a61e',l:'Parks'},{k:'O',c:'#9aa0a6',l:'Special'}].filter(function(i){return zoningVis[i.k];}).forEach(function(i){html+='<span class="li"><span class="ls" style="background:'+i.c+'"></span>'+i.l+'</span>';});
  } else if(activeLayer==='landuse'){
    [{c:'#FEFFA8',l:'1-2 Fam'},{c:'#FCB842',l:'Walk-Up MF'},{c:'#B16E00',l:'Elevator MF'},{c:'#ff8341',l:'Mixed'},{c:'#fc2929',l:'Comm'},{c:'#E362FB',l:'Industrial'},{c:'#44A3D5',l:'Public'},{c:'#78D271',l:'Open Space'},{c:'#BAB8B6',l:'Parking'},{c:'#555',l:'Vacant'}].forEach(function(i){html+='<span class="li"><span class="ls" style="background:'+i.c+'"></span>'+i.l+'</span>';});
  } else if(activeLayer==='landmarks'){
    Object.keys(lmVis).forEach(function(name,i){var c=LM_PAL[i%LM_PAL.length];html+='<span class="li"><span class="ls" style="background:'+c+';opacity:'+(lmVis[name]?1:.3)+'"></span>'+name.replace(' Historic District','').replace(' Extension',' Ext.')+'</span>';});
  }
  document.getElementById('legend').innerHTML=html;
}

// Address search
function pRow(icon,label,val){return'<tr style="border-bottom:1px solid #f0efed"><td style="padding:5px 10px 5px 0;vertical-align:top;white-space:nowrap"><span style="font-size:.85rem">'+icon+'</span><span style="font-size:.63rem;font-family:DM Mono,monospace;text-transform:uppercase;color:#888;margin-left:4px">'+label+'</span></td><td style="padding:5px 0;font-size:.78rem;color:#0d1b4b;line-height:1.4">'+val+'</td></tr>';}

function doSearch(){
  var addr=document.getElementById('s-input').value.trim();if(!addr)return;
  var res=document.getElementById('s-result');res.style.display='block';res.innerHTML='<span style="color:#888;font-size:.78rem">Searching…</span>';
  fetch('https://geosearch.planninglabs.nyc/v2/search?text='+encodeURIComponent(addr)+'&size=1').then(function(r){return r.json();}).then(function(geo){
    if(!geo.features||!geo.features.length){res.innerHTML='<span style="color:#c81e1e;font-size:.78rem">Address not found.</span>';return;}
    var feat=geo.features[0],lat=feat.geometry.coordinates[1],lng=feat.geometry.coordinates[0],lbl=feat.properties.label||addr;
    var pad=feat.properties.addendum&&feat.properties.addendum.pad||{};
    var bbl=pad.bbl||'';
    var zone='—';
    (zoningData&&zoningData.features||[]).forEach(function(f){if(zone!=='—')return;if(pip(lng,lat,f))zone=normZ(getZLbl(f.properties||{}));});
    var lm='None';
    (lmData&&lmData.features||[]).forEach(function(f){if(lm!=='None')return;if(pip(lng,lat,f))lm=f.properties.area_name||'Historic District';});
    var luP=bbl?fetch('https://data.cityofnewyork.us/resource/64uk-42ks.json?bbl='+encodeURIComponent(bbl)+'&$select=landuse,address').then(function(r){return r.json();}).catch(function(){return[];}):Promise.resolve([]);
    luP.then(function(luData){
      var lu='—';if(luData&&luData[0]&&luData[0].landuse){var c=String(luData[0].landuse).replace(/\.0+$/,'').padStart(2,'0');lu=(LU_LABELS[c]||'Unknown')+' ('+c+')';}
      var inLm=lm!=='None';
      var card='<div style="font-family:DM Sans,sans-serif;min-width:240px;max-width:300px"><div style="font-weight:700;font-size:.85rem;color:#0d1b4b;background:#fff7f0;border-bottom:2px solid #f47920;padding:6px 10px;border-radius:8px 8px 0 0">📍 '+escH(lbl)+'</div><table style="border-collapse:collapse;width:100%">'+pRow('🧭','Zoning','<strong>'+escH(zone)+'</strong>')+pRow('🏘','Land Use',escH(lu))+pRow('🏛','Landmark',inLm?'<strong style="color:#b5862b">'+escH(lm)+'</strong>':'<span style="color:#888">None</span>')+'</table></div>';
      if(searchMarker)map.removeLayer(searchMarker);
      searchMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="background:#fff;border:2px solid #f47920;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);overflow:hidden">'+card+'</div>',iconSize:[300,1],iconAnchor:[0,0]}),zIndexOffset:9999}).addTo(map);
      map.setView([lat,lng],16);
      res.style.cssText='display:block;padding:10px 14px;background:#fff;border-bottom:2px solid #f47920;font-family:DM Sans,sans-serif;font-size:.78rem';
      res.innerHTML='<strong>'+escH(lbl)+'</strong> — Zoning: <strong>'+escH(zone)+'</strong>'+(inLm?' · <strong style="color:#b5862b">'+escH(lm)+'</strong>':'')+' · Land Use: '+escH(lu);
    });
  }).catch(function(){res.innerHTML='<span style="color:#c81e1e;font-size:.78rem">Search failed.</span>';});
}
document.getElementById('s-input').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});

// Init sub bar and legend
buildSubBar();
updateLegend();
</script>
</body>
</html>
