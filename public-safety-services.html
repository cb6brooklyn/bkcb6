<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKCB6 — Public Safety</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1b4b}
body{display:flex;flex-direction:column}
.top-bar{background:#0d1b4b;border-bottom:3px solid #f47920;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.top-bar h1{font-size:.92rem;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.top-bar h1 span{color:#f47920}
.back-link{font-size:.7rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap;margin-left:auto}
.back-link:hover{color:#f47920}
.layer-bar{padding:8px 14px;background:#0d1b4b;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.layer-bar span{font-size:.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-right:2px}
.lbtn{padding:5px 13px;font-size:.76rem;font-family:'DM Sans',sans-serif;font-weight:700;border:1.5px solid rgba(255,255,255,.25);border-radius:20px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;white-space:nowrap}
.lbtn.on{background:var(--pc);border-color:var(--pc);color:#fff}
.legend-bar{padding:6px 14px;background:#fafaf8;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:10px;align-items:center;flex-shrink:0}
.li{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:#444}
.ls{display:inline-block;width:14px;height:10px;border-radius:2px}
#map{flex:1;min-height:300px}
.note-bar{padding:4px 14px;font-size:.65rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.3);background:#0d1b4b;flex-shrink:0}
.note-bar a{color:#f47920;text-decoration:none}
</style>
</head>
<body>
<div class="top-bar">
  <h1>BKCB6 <span>Public Safety</span></h1>
  <a class="back-link" href="cb-bk-6.html">← CB6</a>
</div>
<div class="layer-bar">
  <span>Layers</span>
  <button class="lbtn on" onclick="togLayer('nypd',this)" style="--pc:#1d4ed8">🚔 NYPD Sectors</button>
  <button class="lbtn on" onclick="togLayer('fdny',this)" style="--pc:#dc2626">🚒 FDNY Battalions</button>
  <button class="lbtn on" onclick="togLayer('firehouses',this)" style="--pc:#b91c1c">🏠 Firehouses</button>
  <button class="lbtn on" onclick="togLayer('dsny',this)" style="--pc:#15803d">🗑 DSNY Sections</button>
</div>
<div class="legend-bar">
  <span class="li"><span class="ls" style="background:#1d4ed8;opacity:.5"></span>NYPD Sectors (Pcts 76, 78, 84)</span>
  <span class="li"><span class="ls" style="background:#dc2626;opacity:.5"></span>FDNY Battalions</span>
  <span class="li"><span style="font-size:.9rem">🚒</span>Firehouses (CB6 = orange)</span>
  <span class="li"><span class="ls" style="background:#15803d;opacity:.5"></span>DSNY Sections</span>
  <span class="li"><span class="ls" style="background:transparent;border:2px dashed #f47920"></span>CB6 Boundary</span>
</div>
<div id="map"></div>
<div class="note-bar" id="note">Loading… &nbsp;|&nbsp; <a href="cb-bk-6.html">← CB6</a></div>

<script>
var map = L.map('map',{scrollWheelZoom:true}).setView([40.671,-73.990],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

var vis = {nypd:true, fdny:true, firehouses:true, dsny:true};
var layers = {nypd:null, fdny:null, firehouses:null, dsny:null};
var boundaryLayer = null;

function togLayer(k, btn){
  vis[k] = !vis[k];
  btn.classList.toggle('on');
  if(layers[k]){ vis[k] ? layers[k].addTo(map) : map.removeLayer(layers[k]); }
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

Promise.all([
  fetch('nyc_cb_boundaries.geojson').then(function(r){return r.json();}),
  fetch('data/nypd_sectors_cb6.geojson').then(function(r){return r.json();}),
  fetch('data/fire_battalions_cb6.geojson').then(function(r){return r.json();}),
  fetch('data/fdny_firehouses_cb6.geojson').then(function(r){return r.json();}),
  fetch('data/dsny_sections_cb6.geojson').then(function(r){return r.json();})
]).then(function(res){
  var bdData=res[0], nypdData=res[1], fdnyData=res[2], housesData=res[3], dsnyData=res[4];

  // CB6 boundary
  var cb6 = (bdData.features||[]).find(function(f){return String(f.properties&&f.properties.boro_cd)==='306';});
  if(cb6){
    boundaryLayer = L.geoJSON(cb6,{style:function(){return{color:'#f47920',weight:3,fill:false,dashArray:'6 3'};}}).addTo(map);
    map.fitBounds(boundaryLayer.getBounds(),{padding:[24,24]});
  }

  // NYPD Sectors — color by precinct, label each precinct
  var cb6Pcts = ['76','78'];
  var pctColors = {'76':'#1d4ed8','78':'#7c3aed'};
  var pctDefault = '#93c5fd';

  // Compute centroid of all sectors per precinct for label placement
  var pctBounds = {};
  (nypdData.features||[]).forEach(function(f){
    var pct = String(f.properties.pct||'').replace(/^0+/,'');
    if(!pctBounds[pct]) pctBounds[pct] = [];
    try{
      var tmp = L.geoJSON(f);
      var b = tmp.getBounds();
      pctBounds[pct].push(b.getCenter());
    }catch(e){}
  });

  layers.nypd = L.layerGroup();
  var nypdGeo = L.geoJSON(nypdData,{
    style:function(f){
      var pct = String(f.properties.pct||'').replace(/^0+/,'');
      var isCB6 = cb6Pcts.indexOf(pct)!==-1;
      var col = pctColors[pct]||pctDefault;
      return{color:col,weight:isCB6?2.5:1,fillColor:col,fillOpacity:isCB6?.1:.03,dashArray:isCB6?null:'3 3'};
    },
    onEachFeature:function(f,l){
      var pct = String(f.properties.pct||'').replace(/^0+/,'');
      var sec = f.properties.sector||'';
      l.bindTooltip('<strong>🚔 '+escH(pct)+'th Precinct — Sector '+escH(sec)+'</strong>',{sticky:true,opacity:1});
    }
  }).addTo(layers.nypd);

  // Add precinct number labels for CB6 precincts
  cb6Pcts.forEach(function(pct){
    if(!pctBounds[pct]||!pctBounds[pct].length) return;
    // Average centroid
    var avgLat = pctBounds[pct].reduce(function(s,c){return s+c.lat;},0)/pctBounds[pct].length;
    var avgLng = pctBounds[pct].reduce(function(s,c){return s+c.lng;},0)/pctBounds[pct].length;
    var col = pctColors[pct]||'#1d4ed8';
    var icon = L.divIcon({
      className:'',
      html:'<div style="background:'+col+';color:#fff;font-family:DM Sans,sans-serif;font-size:.72rem;font-weight:800;padding:3px 7px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">'+pct+'th Pct</div>',
      iconAnchor:[30,10]
    });
    L.marker([avgLat,avgLng],{icon:icon,interactive:false,zIndexOffset:500}).addTo(layers.nypd);
  });

  if(vis.nypd) layers.nypd.addTo(map);

  // FDNY Battalions
  var bnColors = ['#dc2626','#b91c1c','#ef4444','#f87171','#fca5a5'];
  layers.fdny = L.geoJSON(fdnyData,{
    style:function(f,i){
      return{color:'#dc2626',weight:2,fillColor:'#dc2626',fillOpacity:.07};
    },
    onEachFeature:function(f,l){
      var bn = f.properties.fire_bn||'?';
      l.bindTooltip('<strong>🚒 FDNY Battalion '+escH(String(bn))+'</strong>',{sticky:true,opacity:1});
    }
  });
  if(vis.fdny) layers.fdny.addTo(map);

  // Firehouses — markers, CB6 ones highlighted
  var cb6Houses = (housesData.features||[]).filter(function(f){return f.properties.cb==='306';});
  var otherHouses = (housesData.features||[]).filter(function(f){return f.properties.cb!=='306';});

  function houseIcon(isCB6){
    return L.divIcon({
      className:'',
      html:'<div style="font-size:'+(isCB6?'1.2':'0.85')+'rem;filter:'+(isCB6?'none':'grayscale(1) opacity(.5)')+'">🚒</div>',
      iconSize:[isCB6?24:16,isCB6?24:16],
      iconAnchor:[isCB6?12:8,isCB6?12:8]
    });
  }

  layers.firehouses = L.layerGroup();
  otherHouses.forEach(function(f){
    var ll = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
    L.marker(ll,{icon:houseIcon(false)})
      .bindTooltip('<strong>'+escH(f.properties.name)+'</strong><br><span style="font-size:.75rem;color:#555">'+escH(f.properties.address)+'</span>',{sticky:true,opacity:1})
      .addTo(layers.firehouses);
  });
  cb6Houses.forEach(function(f){
    var ll = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
    L.marker(ll,{icon:houseIcon(true), zIndexOffset:1000})
      .bindTooltip('<strong style="color:#dc2626">'+escH(f.properties.name)+'</strong><br><span style="font-size:.75rem;color:#555">'+escH(f.properties.address)+'</span><br><span style="font-size:.7rem;font-family:DM Mono,monospace;color:#f47920">CB6</span>',{sticky:true,opacity:1})
      .addTo(layers.firehouses);
  });
  if(vis.firehouses) layers.firehouses.addTo(map);

  // DSNY Sections
  layers.dsny = L.geoJSON(dsnyData,{
    style:function(f){
      return{color:'#15803d',weight:1.5,fillColor:'#15803d',fillOpacity:.06};
    },
    onEachFeature:function(f,l){
      var dist = f.properties.district||'?';
      var sec = f.properties.section||'';
      l.bindTooltip('<strong>🗑 DSNY '+escH(String(dist))+(sec?' — Section '+escH(String(sec)):'')+'</strong>',{sticky:true,opacity:1});
    }
  });
  if(vis.dsny) layers.dsny.addTo(map);

  // Precinct houses — permanent markers
  var precinctHouseIcon = L.divIcon({
    className:'',
    html:'<div style="font-size:1.1rem">🚔</div>',
    iconSize:[22,22], iconAnchor:[11,11]
  });
  var dsnyGarageIcon = L.divIcon({
    className:'',
    html:'<div style="font-size:1.1rem">🗑</div>',
    iconSize:[22,22], iconAnchor:[11,11]
  });
  L.marker([40.6702, -73.9887], {icon:dsnyGarageIcon, zIndexOffset:2000})
    .bindTooltip('<strong>🗑 DSNY BK6 Garage</strong><br><span style="font-size:.75rem;color:#555">2nd Ave, Brooklyn NY 11215</span>', {sticky:true,opacity:1})
    .addTo(map);

  var precinctHouses = [
    {name:'78th Precinct', addr:'65 6th Avenue, Brooklyn NY 11217', lat:40.6821, lng:-73.9759},
    {name:'76th Precinct', addr:'191 Union Street, Brooklyn NY 11231', lat:40.6763, lng:-73.9991},
  ];
  var precinctHouseLayer = L.layerGroup();
  precinctHouses.forEach(function(p){
    L.marker([p.lat, p.lng], {icon:precinctHouseIcon, zIndexOffset:2000})
      .bindTooltip('<strong>🚔 '+p.name+'</strong><br><span style="font-size:.75rem;color:#555">'+p.addr+'</span>', {sticky:true,opacity:1})
      .addTo(precinctHouseLayer);
  });
  precinctHouseLayer.addTo(map);

  if(boundaryLayer) boundaryLayer.bringToFront();
  document.getElementById('note').textContent = nypdData.features.length+' NYPD sectors · '+fdnyData.features.length+' FDNY battalions · '+dsnyData.features.length+' DSNY sections · '+cb6Houses.length+' CB6 firehouses';

}).catch(function(e){
  document.getElementById('note').textContent = 'Load error: '+e;
});
</script>
</body>
</html>
