<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKCB6 — Parks & Athletic Facilities</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1b4b}
body{display:flex;flex-direction:column}
.top-bar{background:#0d1b4b;border-bottom:3px solid #f47920;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.top-bar h1{font-size:.92rem;font-weight:700;color:#fff;flex-shrink:0}
.top-bar h1 span{color:#f47920}
.search-row{display:flex;gap:6px;flex:1;min-width:180px}
.search-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:.83rem;padding:6px 11px;border:none;border-radius:6px;background:rgba(255,255,255,.12);color:#fff;outline:none}
.search-row input::placeholder{color:rgba(255,255,255,.4)}
.search-row button{padding:6px 14px;background:#f47920;color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.back-link{font-size:.7rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap;margin-left:auto}
.back-link:hover{color:#f47920}
.layer-bar{padding:7px 14px;background:#0d1b4b;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.layer-bar span{font-size:.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-right:2px}
.lbtn{padding:4px 11px;font-size:.74rem;font-family:'DM Sans',sans-serif;font-weight:700;border:1.5px solid rgba(255,255,255,.25);border-radius:16px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;white-space:nowrap}
.lbtn.on{background:var(--pc);border-color:var(--pc);color:#fff}
.legend-bar{padding:5px 14px;background:#fafaf8;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0;min-height:26px}
.li{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:#444}
.ls{display:inline-block;width:12px;height:10px;border-radius:2px}
.addr-result{display:none;padding:8px 14px;background:#fff;border-bottom:2px solid #f47920;flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:.82rem}
#map{flex:1;min-height:300px}
.note-bar{padding:4px 14px;font-size:.65rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.3);background:#0d1b4b;flex-shrink:0}
.note-bar a{color:#f47920;text-decoration:none}
</style>
</head>
<body>

<div class="top-bar">
  <h1>BKCB6 <span>Parks & Athletic Facilities</span></h1>
  <div class="search-row">
    <input id="s-input" type="text" placeholder="Search a park or address…"/>
    <button onclick="doSearch()">Search</button>
  </div>
  <a class="back-link" href="cb-bk-6.html">← CB6</a>
</div>

<div class="layer-bar">
  <span>Show</span>
  <button class="lbtn on" onclick="togLayer('parks',this)" style="--pc:#22c55e" id="btn-parks">🌳 Parks</button>
  <button class="lbtn on" onclick="togLayer('athletic',this)" style="--pc:#f59e0b" id="btn-athletic">⚽ Athletic Facilities</button>
</div>
<div class="legend-bar" id="legend">
  <span class="li"><span class="ls" style="background:#22c55e;opacity:.6"></span>Parks</span>
  <span class="li"><span class="ls" style="background:#f59e0b;opacity:.7"></span>Athletic Facilities</span>
  <span class="li"><span class="ls" style="background:transparent;border:2px dashed #f47920"></span>CB6 Boundary</span>
</div>
<div class="addr-result" id="s-result"></div>
<div id="map"></div>
<div class="note-bar" id="note">Loading… &nbsp;|&nbsp; <a href="cb-bk-6.html">← CB6</a></div>

<script>
var map = L.map('map',{scrollWheelZoom:true}).setView([40.671,-73.990],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

var parkLayer=null, athleticLayer=null, boundaryLayer=null, searchMarker=null;
var visPark=true, visAthletic=true;
var allData=null;

var SPORT_LABELS = {
  'BKB':'Basketball','BOC':'Bocce','BSB':'Baseball','CRK':'Cricket',
  'FTB':'Football','HDB':'Handball','HKY':'Hockey','MPPA':'Multi-Purpose',
  'SCR':'Soccer','SFB':'Softball','TNS':'Tennis','TRK':'Track','VLB':'Volleyball'
};

var TYPE_COLORS = {
  'Flagship Park':'#15803d','Community Park':'#22c55e','Neighborhood Park':'#4ade80',
  'Playground':'#86efac','Jointly Operated Playground':'#bbf7d0',
  'Recreational Field/Courts':'#d1fae5','Garden':'#a7f3d0',
  'Triangle/Plaza':'#6ee7b7','Strip':'#34d399','Undeveloped':'#6b7280'
};

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function togLayer(k,btn){
  btn.classList.toggle('on');
  if(k==='parks'){
    visPark=!visPark;
    if(parkLayer){visPark?parkLayer.addTo(map):map.removeLayer(parkLayer);}
  } else {
    visAthletic=!visAthletic;
    if(athleticLayer){visAthletic?athleticLayer.addTo(map):map.removeLayer(athleticLayer);}
  }
}

Promise.all([
  fetch('data/bkcb6-parks.geojson').then(function(r){return r.json();}),
  fetch('data/cb6-boundary-kml.geojson').then(function(r){return r.json();})
]).then(function(res){
  allData=res[0];
  var bndData=res[1];

  boundaryLayer=L.geoJSON(bndData,{style:function(){return{color:'#f47920',weight:2,fill:false,dashArray:'5 3'};}}).addTo(map);
  map.fitBounds(boundaryLayer.getBounds(),{padding:[18,18]});

  var parks = allData.features.filter(function(f){return f.properties.layer==='park';});
  var athletic = allData.features.filter(function(f){return f.properties.layer==='athletic_facility';});

  parkLayer = L.geoJSON({type:'FeatureCollection',features:parks},{
    style:function(f){
      var tc = f.properties.type_category||'';
      return{color:'#fff',weight:.8,fillColor:TYPE_COLORS[tc]||'#22c55e',fillOpacity:.55};
    },
    onEachFeature:function(f,l){
      var p=f.properties;
      l.bindTooltip(
        '<strong>🌳 '+escH(p.name||p.sign_name||'')+'</strong>'+
        (p.type_category?'<br><span style="font-size:.75rem;color:#555">'+escH(p.type_category)+'</span>':'')+
        (p.acres?'<br><span style="font-size:.72rem;color:#888">'+parseFloat(p.acres).toFixed(1)+' acres</span>':''),
        {sticky:true,opacity:1}
      );
    }
  }).addTo(map);

  athleticLayer = L.geoJSON({type:'FeatureCollection',features:athletic},{
    style:function(){return{color:'#fff',weight:.8,fillColor:'#f59e0b',fillOpacity:.6};},
    onEachFeature:function(f,l){
      var p=f.properties;
      var sport = SPORT_LABELS[p.sport]||p.sport||'';
      l.bindTooltip(
        '<strong>⚽ '+escH(p.name||'')+'</strong>'+
        (sport?'<br><span style="font-size:.75rem;color:#555">'+escH(sport)+'</span>':'')+
        (p.facility_type?'<br><span style="font-size:.72rem;color:#888">'+escH(p.facility_type)+'</span>':'')+
        (p.surface_type?'<br><span style="font-size:.72rem;color:#888">Surface: '+escH(p.surface_type)+'</span>':''),
        {sticky:true,opacity:1}
      );
    }
  }).addTo(map);

  boundaryLayer.bringToFront();
  document.getElementById('note').textContent = parks.length+' parks · '+athletic.length+' athletic facilities. Hover for details.';
}).catch(function(e){
  document.getElementById('note').textContent='Load error: '+e;
});

function doSearch(){
  var q=document.getElementById('s-input').value.trim().toLowerCase();
  if(!q) return;
  var res=document.getElementById('s-result');

  // First try local park name match
  if(allData){
    var match=allData.features.find(function(f){
      return (f.properties.name||'').toLowerCase().indexOf(q)!==-1 ||
             (f.properties.sign_name||'').toLowerCase().indexOf(q)!==-1;
    });
    if(match){
      try{
        var b=L.geoJSON(match).getBounds();
        map.fitBounds(b,{padding:[40,40]});
        res.style.display='block';
        res.innerHTML='<strong>'+escH(match.properties.name||match.properties.sign_name||'')+'</strong> — '+escH(match.properties.type_category||match.properties.facility_type||'');
        return;
      }catch(e){}
    }
  }

  // Fall back to address geocode
  res.style.display='block';res.innerHTML='Searching…';
  fetch('https://geosearch.planninglabs.nyc/v2/search?text='+encodeURIComponent(document.getElementById('s-input').value.trim())+'&size=1')
    .then(function(r){return r.json();}).then(function(geo){
      if(!geo.features||!geo.features.length){res.innerHTML='Not found.';return;}
      var feat=geo.features[0],lat=feat.geometry.coordinates[1],lng=feat.geometry.coordinates[0];
      if(searchMarker)map.removeLayer(searchMarker);
      searchMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#f47920',color:'#fff',weight:2,fillOpacity:1}).addTo(map);
      map.setView([lat,lng],16);
      res.innerHTML='<strong>'+escH(feat.properties.label||'')+'</strong>';
    }).catch(function(){res.innerHTML='Search failed.';});
}
document.getElementById('s-input').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
