<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BKCB6 — Parks & Athletic Facilities</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1b4b}
body{display:flex;flex-direction:column}
.top-bar{background:#0d1b4b;border-bottom:3px solid #f47920;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.top-bar h1{font-size:.92rem;font-weight:700;color:#fff;flex-shrink:0}
.top-bar h1 span{color:#f47920}
.back-link{font-size:.7rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap;margin-left:auto}
.back-link:hover{color:#f47920}
.search-bar{background:#132D65;border-bottom:1px solid rgba(255,255,255,.1);padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.search-bar input,.search-bar select{font-family:'DM Sans',sans-serif;font-size:.82rem;padding:6px 10px;border:none;border-radius:6px;background:rgba(255,255,255,.12);color:#fff;outline:none;flex:1;min-width:120px}
.search-bar select option{background:#132D65;color:#fff}
.search-bar input::placeholder{color:rgba(255,255,255,.4)}
.search-bar button{padding:6px 14px;background:#f47920;color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.search-bar button.sec{background:rgba(255,255,255,.15);color:#fff}
.layer-bar{padding:7px 14px;background:#0d1b4b;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.layer-bar span{font-size:.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-right:2px}
.lbtn{padding:4px 11px;font-size:.74rem;font-family:'DM Sans',sans-serif;font-weight:700;border:1.5px solid rgba(255,255,255,.25);border-radius:16px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;white-space:nowrap}
.lbtn.on{background:var(--pc);border-color:var(--pc);color:#fff}
.legend-bar{padding:5px 14px;background:#fafaf8;border-bottom:1px solid #e5e2db;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.li{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:#444}
.ls{display:inline-block;width:12px;height:10px;border-radius:2px}
.result-bar{display:none;padding:8px 14px;background:#fff8f0;border-bottom:2px solid #f47920;flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:.82rem}
#map{flex:1;min-height:300px}
.note-bar{padding:4px 14px;font-size:.65rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,.3);background:#0d1b4b;flex-shrink:0}
.note-bar a{color:#f47920;text-decoration:none}
.park-label{background:transparent;border:none;box-shadow:none;font-family:'DM Sans',sans-serif;font-size:.62rem;font-weight:700;color:#15803d;text-shadow:0 0 3px #fff,0 0 3px #fff;white-space:nowrap;pointer-events:none}
.athletic-label{background:transparent;border:none;box-shadow:none;font-family:'DM Sans',sans-serif;font-size:.55rem;font-weight:600;color:#92400e;text-shadow:0 0 3px #fff,0 0 3px #fff;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>

<div class="top-bar">
  <h1>BKCB6 <span>Parks & Athletic Facilities</span></h1>
  <a class="back-link" href="cb-bk-6.html">← CB6</a>
</div>

<div class="search-bar">
  <input id="s-addr" type="text" placeholder="Address or park name…"/>
  <select id="s-activity">
    <option value="">All activities</option>
    <option value="BKB">Basketball</option>
    <option value="BOC">Bocce</option>
    <option value="BSB">Baseball</option>
    <option value="CRK">Cricket</option>
    <option value="FTB">Football</option>
    <option value="HDB">Handball</option>
    <option value="HKY">Hockey</option>
    <option value="MPPA">Multi-Purpose</option>
    <option value="SCR">Soccer</option>
    <option value="SFB">Softball</option>
    <option value="TNS">Tennis</option>
    <option value="TRK">Track</option>
    <option value="VLB">Volleyball</option>
  </select>
  <button onclick="doSearch()">Search</button>
  <button class="sec" onclick="findNearest()">📍 Nearest Park</button>
</div>

<div class="layer-bar">
  <span>Show</span>
  <button class="lbtn on" onclick="togLayer('parks',this)" style="--pc:#22c55e" id="btn-parks">🌳 Parks</button>
  <button class="lbtn on" onclick="togLayer('athletic',this)" style="--pc:#f59e0b" id="btn-athletic">⚽ Athletic Facilities</button>
</div>
<div class="legend-bar" id="legend"></div>
<div class="result-bar" id="result-bar"></div>
<div id="map"></div>
<div class="note-bar" id="note">Loading… &nbsp;|&nbsp; <a href="cb-bk-6.html">← CB6</a></div>

<script>
var map = L.map('map',{scrollWheelZoom:true}).setView([40.671,-73.990],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

var parkLayer=null,athleticLayer=null,boundaryLayer=null,labelGroup=null,searchMarker=null,highlightLayer=null;
var visPark=true,visAthletic=true;
var allData=null;

var SPORT_LABELS={'BKB':'Basketball','BOC':'Bocce','BSB':'Baseball','CRK':'Cricket','FTB':'Football','HDB':'Handball','HKY':'Hockey','MPPA':'Multi-Purpose','SCR':'Soccer','SFB':'Softball','TNS':'Tennis','TRK':'Track','VLB':'Volleyball'};
var TYPE_COLORS={'Flagship Park':'#15803d','Community Park':'#22c55e','Neighborhood Park':'#4ade80','Playground':'#86efac','Jointly Operated Playground':'#bbf7d0','Recreational Field/Courts':'#d1fae5','Garden':'#a7f3d0','Triangle/Plaza':'#6ee7b7','Strip':'#34d399','Undeveloped':'#9ca3af'};

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getBoundsCenter(feature){try{return L.geoJSON(feature).getBounds().getCenter();}catch(e){return null;}}

function buildLabels(){
  if(labelGroup)map.removeLayer(labelGroup);
  labelGroup=L.layerGroup();
  var zoom=map.getZoom();
  if(zoom<14)return;
  allData.features.forEach(function(f){
    var p=f.properties;
    var name=p.name||p.sign_name||'';
    if(!name)return;
    var show=(f.properties.layer==='park'&&visPark)||(f.properties.layer==='athletic_facility'&&visAthletic);
    if(!show)return;
    var ctr=getBoundsCenter(f);
    if(!ctr)return;
    var cls=f.properties.layer==='park'?'park-label':'athletic-label';
    var short=name.length>22?name.substring(0,20)+'…':name;
    L.marker([ctr.lat,ctr.lng],{
      icon:L.divIcon({className:cls,html:escH(short),iconAnchor:[0,0]}),
      interactive:false,zIndexOffset:-100
    }).addTo(labelGroup);
  });
  labelGroup.addTo(map);
}

function togLayer(k,btn){
  btn.classList.toggle('on');
  if(k==='parks'){
    visPark=!visPark;
    if(parkLayer){visPark?parkLayer.addTo(map):map.removeLayer(parkLayer);}
  } else {
    visAthletic=!visAthletic;
    if(athleticLayer){visAthletic?athleticLayer.addTo(map):map.removeLayer(athleticLayer);}
  }
  buildLabels();
}

function buildLayers(data){
  var parks=data.features.filter(function(f){return f.properties.layer==='park';});
  var athletic=data.features.filter(function(f){return f.properties.layer==='athletic_facility';});

  parkLayer=L.geoJSON({type:'FeatureCollection',features:parks},{
    style:function(f){var tc=f.properties.type_category||'';return{color:'rgba(255,255,255,.6)',weight:.8,fillColor:TYPE_COLORS[tc]||'#22c55e',fillOpacity:.55};},
    onEachFeature:function(f,l){
      var p=f.properties;
      l.bindTooltip('<strong>🌳 '+escH(p.name||p.sign_name||'')+'</strong>'+(p.type_category?'<br><span style="font-size:.75rem;color:#555">'+escH(p.type_category)+'</span>':'')+(p.acres?'<br><span style="font-size:.72rem;color:#888">'+parseFloat(p.acres).toFixed(1)+' acres</span>':'')+(p.address?'<br><span style="font-size:.72rem;color:#888">'+escH(p.address)+'</span>':''),{sticky:true,opacity:1});
    }
  });
  if(visPark)parkLayer.addTo(map);

  athleticLayer=L.geoJSON({type:'FeatureCollection',features:athletic},{
    style:function(){return{color:'rgba(255,255,255,.6)',weight:.8,fillColor:'#f59e0b',fillOpacity:.65};},
    onEachFeature:function(f,l){
      var p=f.properties;
      var sport=SPORT_LABELS[p.sport]||p.sport||'';
      l.bindTooltip('<strong>⚽ '+escH(p.name||'')+'</strong>'+(sport?'<br><span style="font-size:.75rem;color:#555">'+escH(sport)+'</span>':'')+(p.facility_type&&p.facility_type!==sport?'<br><span style="font-size:.72rem;color:#888">'+escH(p.facility_type)+'</span>':'')+(p.surface_type?'<br><span style="font-size:.72rem;color:#888">Surface: '+escH(p.surface_type)+'</span>':''),{sticky:true,opacity:1});
    }
  });
  if(visAthletic)athleticLayer.addTo(map);
}

function buildLegend(){
  var html='';
  Object.keys(TYPE_COLORS).forEach(function(k){
    html+='<span class="li"><span class="ls" style="background:'+TYPE_COLORS[k]+';opacity:.7"></span>'+k+'</span>';
  });
  html+='<span class="li"><span class="ls" style="background:#f59e0b;opacity:.7"></span>Athletic Facility</span>';
  html+='<span class="li"><span class="ls" style="background:transparent;border:2px dashed #f47920"></span>CB6 Boundary</span>';
  document.getElementById('legend').innerHTML=html;
}

Promise.all([
  fetch('data/bkcb6-parks.geojson').then(function(r){return r.json();}),
  fetch('data/cb6-boundary-kml.geojson').then(function(r){return r.json();})
]).then(function(res){
  allData=res[0];
  boundaryLayer=L.geoJSON(res[1],{style:function(){return{color:'#f47920',weight:2,fill:false,dashArray:'5 3'};}}).addTo(map);
  map.fitBounds(boundaryLayer.getBounds(),{padding:[18,18]});
  buildLayers(allData);
  boundaryLayer.bringToFront();
  buildLegend();
  buildLabels();
  map.on('zoomend',buildLabels);
  var parks=allData.features.filter(function(f){return f.properties.layer==='park';});
  var athletic=allData.features.filter(function(f){return f.properties.layer==='athletic_facility';});
  document.getElementById('note').textContent=parks.length+' parks · '+athletic.length+' athletic facilities. Labels appear at zoom 14+.';
}).catch(function(e){document.getElementById('note').textContent='Load error: '+e;});

function showResult(html){var b=document.getElementById('result-bar');b.style.display='block';b.innerHTML=html;}
function highlight(feature){
  if(highlightLayer)map.removeLayer(highlightLayer);
  highlightLayer=L.geoJSON(feature,{style:function(){return{color:'#f47920',weight:3,fillColor:'#f47920',fillOpacity:.3};}}).addTo(map);
  setTimeout(function(){if(highlightLayer)map.removeLayer(highlightLayer);highlightLayer=null;},3000);
}

function doSearch(){
  var q=document.getElementById('s-addr').value.trim();
  var activity=document.getElementById('s-activity').value;
  if(!q&&!activity)return;

  // Activity filter — find all matching athletic facilities
  if(activity&&!q){
    var matches=allData.features.filter(function(f){return f.properties.sport===activity;});
    if(!matches.length){showResult('No '+SPORT_LABELS[activity]+' facilities found in CB6.');return;}
    // Zoom to all matches
    var grp=L.geoJSON({type:'FeatureCollection',features:matches});
    map.fitBounds(grp.getBounds(),{padding:[30,30]});
    showResult('<strong>'+matches.length+' '+SPORT_LABELS[activity]+' facilities</strong> in CB6. Hover for details.');
    return;
  }

  // Park name match first
  if(q&&allData){
    var nameMatch=allData.features.find(function(f){
      var p=f.properties;
      return (p.name||'').toLowerCase().indexOf(q.toLowerCase())!==-1||(p.sign_name||'').toLowerCase().indexOf(q.toLowerCase())!==-1;
    });
    if(nameMatch){
      try{
        var b=L.geoJSON(nameMatch).getBounds();
        map.fitBounds(b,{padding:[60,60]});
        highlight(nameMatch);
        var p=nameMatch.properties;
        showResult('<strong>🌳 '+escH(p.name||p.sign_name||'')+'</strong>'+(p.type_category?' · '+escH(p.type_category):'')+(p.acres?' · '+parseFloat(p.acres).toFixed(1)+' acres':''));
        return;
      }catch(e){}
    }
  }

  // Address geocode
  showResult('Searching…');
  fetch('https://geosearch.planninglabs.nyc/v2/search?text='+encodeURIComponent(q)+'&size=1')
    .then(function(r){return r.json();}).then(function(geo){
      if(!geo.features||!geo.features.length){showResult('Address not found.');return;}
      var feat=geo.features[0],lat=feat.geometry.coordinates[1],lng=feat.geometry.coordinates[0];
      if(searchMarker)map.removeLayer(searchMarker);
      searchMarker=L.circleMarker([lat,lng],{radius:6,fillColor:'#f47920',color:'#fff',weight:2,fillOpacity:1}).addTo(map);
      map.setView([lat,lng],15);
      // Find nearest park
      var nearest=null,minD=Infinity;
      var src=activity?allData.features.filter(function(f){return f.properties.sport===activity;}):allData.features.filter(function(f){return f.properties.layer==='park';});
      src.forEach(function(f){
        var c=getBoundsCenter(f);
        if(!c)return;
        var d=Math.sqrt(Math.pow(c.lat-lat,2)+Math.pow(c.lng-lng,2));
        if(d<minD){minD=d;nearest=f;}
      });
      var msg='<strong>'+escH(feat.properties.label||q)+'</strong>';
      if(nearest){
        var p=nearest.properties;
        var sport=activity?(' · '+SPORT_LABELS[activity]):'';
        msg+=' — Nearest'+(activity?' '+SPORT_LABELS[activity]+' facility':' park')+': <strong>'+escH(p.name||p.sign_name||'')+'</strong>'+sport;
        highlight(nearest);
      }
      showResult(msg);
    }).catch(function(){showResult('Search failed.');});
}

function findNearest(){
  if(!navigator.geolocation){showResult('Location not available.');return;}
  showResult('Finding your location…');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude;
    if(searchMarker)map.removeLayer(searchMarker);
    searchMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#f47920',color:'#fff',weight:2,fillOpacity:1}).addTo(map);
    map.setView([lat,lng],15);
    // Find nearest park
    var nearest=null,minD=Infinity;
    var activity=document.getElementById('s-activity').value;
    var src=activity?allData.features.filter(function(f){return f.properties.sport===activity;}):allData.features.filter(function(f){return f.properties.layer==='park';});
    src.forEach(function(f){
      var c=getBoundsCenter(f);
      if(!c)return;
      var d=Math.sqrt(Math.pow(c.lat-lat,2)+Math.pow(c.lng-lng,2));
      if(d<minD){minD=d;nearest=f;}
    });
    if(nearest){
      var p=nearest.properties;
      try{map.fitBounds(L.geoJSON(nearest).getBounds(),{padding:[60,60]});}catch(e){}
      highlight(nearest);
      var dist=Math.round(minD*111000);
      showResult('Nearest'+(activity?' '+SPORT_LABELS[activity]+' facility':' park')+': <strong>'+escH(p.name||p.sign_name||'')+'</strong> (~'+dist+'m away)');
    } else {
      showResult('No matching facilities found.');
    }
  },function(){showResult('Could not get location.');});
}

document.getElementById('s-addr').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
