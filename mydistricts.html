:root{--navy:#0d1b4b;--orange:#f47920;--border:#e5e2db;--muted:#6b6760;--off:#f8f7f4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--navy);min-height:100vh}
header{background:var(--navy);border-bottom:4px solid var(--orange);padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{color:#fff;font-size:1rem;font-weight:700}
header h1 span{color:var(--orange)}
.back{background:none;border:none;color:rgba(255,255,255,.75);font-size:.8rem;font-weight:600;cursor:pointer;padding:0}
.hero{background:var(--navy);padding:24px 20px 28px}
.hero h2{color:#fff;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.6);font-size:.82rem;line-height:1.6;margin-bottom:20px}
.search-row{display:flex;gap:8px;flex-wrap:wrap}
.addr-input{flex:1;min-width:0;padding:12px 14px;border:2px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none}
.addr-input::placeholder{color:rgba(255,255,255,.4)}
.addr-input:focus{border-color:var(--orange)}
.search-btn{padding:12px 20px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;white-space:nowrap}
.borough-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.boro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:none;color:rgba(255,255,255,.65);font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.boro-btn.active{background:rgba(255,255,255,.15);border-color:#fff;color:#fff}
.note{color:rgba(255,255,255,.4);font-size:.72rem;margin-top:10px;font-family:'DM Mono',monospace}
.spinner{color:rgba(255,255,255,.5);font-size:.8rem;font-family:'DM Mono',monospace;padding:8px 0;display:none}
.error{color:#fca5a5;font-size:.82rem;font-family:'DM Mono',monospace;padding:8px 0;display:none}
.results{background:#fff}
.result-block{padding:20px;border-bottom:1px solid var(--border)}
.result-label{font-size:.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);font-weight:700;margin-bottom:8px}
.result-addr{font-size:.82rem;color:var(--muted);margin-bottom:16px;font-family:'DM Mono',monospace}
.district-card{background:var(--off);border-radius:10px;padding:16px;margin-bottom:12px;border-left:4px solid var(--orange)}
.district-card.cb{border-left-color:#1d4ed8}
.dc-type{font-size:.62rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.dc-num{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:2px}
.dc-compact{font-size:1rem;font-weight:700;color:var(--navy)}
.dc-name{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.dc-sub{font-size:.75rem;color:var(--muted);line-height:1.5;margin-bottom:8px}
.dc-link{display:inline-block;padding:7px 14px;background:var(--navy);color:#fff;border-radius:6px;font-size:.78rem;font-weight:700;text-decoration:none}
.dc-link:hover{background:var(--orange)}
.dc-link.orange{background:var(--orange)}
footer{padding:20px;font-size:.72rem;color:rgba(255,255,255,.4);text-align:center;font-family:'DM Mono',monospace}
</style>

<header>
  <button class="back" onclick="window.location.href='index.html'">&#8592; Home</button>

</header>

  <div class="search-row">
    <input type="text" class="addr-input" id="addrInput" placeholder="e.g. 250 Baltic Street"

    <button class="search-btn" onclick="lookup()">Look Up</button>
  </div>
  <div class="borough-row">
    <button class="boro-btn active" id="boro-Brooklyn" onclick="setBoro('Brooklyn')">Brooklyn</button>
    <button class="boro-btn" id="boro-Manhattan" onclick="setBoro('Manhattan')">Manhattan</button>
    <button class="boro-btn" id="boro-Queens" onclick="setBoro('Queens')">Queens</button>
    <button class="boro-btn" id="boro-Bronx" onclick="setBoro('Bronx')">Bronx</button>
    <button class="boro-btn" id="boro-Staten Island" onclick="setBoro('Staten Island')">Staten Island</button>
  </div>
  <div class="note">Data: NYC Geoclient API</div>
  <div class="spinner" id="spinner">Looking up address...</div>
  <div class="error" id="error"></div>
</div>

<div id="split-container" style="display:none;background:#fff;border-top:3px solid var(--orange)">
  <div style="display:flex;align-items:stretch;flex-wrap:wrap">
    <div class="results" id="results" style="flex:1;min-width:280px;max-height:600px;overflow-y:auto;border-right:1px solid var(--border)"></div>
    <div id="map-container" style="flex:1;min-width:280px;height:600px;position:sticky;top:0"></div>
  </div>
</div>

<footer>Brooklyn Community Board 6 · 250 Baltic Street, Brooklyn, NY 11201</footer>

  6:["Grace Meng","https://meng.house.gov"],
  7:["Nydia Velázquez","https://velazquez.house.gov"],
  8:["Hakeem Jeffries","https://jeffries.house.gov"],
  9:["Yvette Clarke","https://clarke.house.gov"],
  10:["Dan Goldman","https://goldman.house.gov"],
  11:["Nicole Malliotakis","https://malliotakis.house.gov"],
  12:["Jerry Nadler","https://nadler.house.gov"],
  13:["Adriano Espaillat","https://espaillat.house.gov"],
  14:["Alexandria Ocasio-Cortez","https://ocasio-cortez.house.gov"],
  15:["Ritchie Torres","https://torres.house.gov"],
  16:["George Latimer","https://latimer.house.gov"],
};

async function lookup() {
  const input = document.getElementById('addrInput').value.trim();
  if (!input) return;
  const spinner = document.getElementById('spinner');
  const error = document.getElementById('error');
  const results = document.getElementById('results');
  spinner.style.display = 'block';
  error.style.display = 'none';
  results.style.display = 'none';

  // Parse house number and street
  const m = input.match(/^(\d+[-\d]*)\s+(.+)$/);
  if (!m) {
    spinner.style.display = 'none';
    error.textContent = 'Please enter a full address, e.g. "250 Baltic Street"';
    error.style.display = 'block';
    return;
  }
  const houseNum = m[1];
  const street = m[2];

  try {
    const url = `https://api.nyc.gov/geoclient/v2/address.json?houseNumber=${encodeURIComponent(houseNum)}&street=${encodeURIComponent(street)}&borough=${encodeURIComponent(currentBoro)}`;
    const resp = await fetch(url, { headers: { 'Ocp-Apim-Subscription-Key': 'b913bdfb9c47466589d0f08c99c75b21' } });
    const data = await resp.json();
    const a = data.address;
    spinner.style.display = 'none';

    if (!a || a.message || !a.cityCouncilDistrict) {
      error.textContent = 'Address not found. Check the address and borough and try again.';
      error.style.display = 'block';
      return;
    }

    const cdNum = parseInt(a.cityCouncilDistrict);
    const cdInfo = COUNCIL[cdNum];
    const cbRaw = a.communityDistrict;
    const cbNum = parseInt(cbRaw) % 100;
    const boroCode = BORO_CODES[currentBoro];
    const cbKey = boroCode + '-' + cbNum;
    const cbUrl = CB_URLS[cbKey] || '#';
    const boroName = BORO_NAMES[boroCode];
    const displayAddr = (a.houseNumber||houseNum) + ' ' + (a.firstStreetNameNormalized||street) + ', ' + (a.uspsPreferredCityName||currentBoro) + ', NY ' + (a.zipCode||'');

    // Show map if coordinates available
    const lat = parseFloat(a.latitude || a.latitudeInternalLabel);
    const lng = parseFloat(a.longitude || a.longitudeInternalLabel);

    // Build popup content
    const popupHtml = `
      <div style="font-size:.78rem;font-family:'DM Sans',sans-serif;min-width:180px">
        <div style="font-weight:700;color:#0d1b4b;margin-bottom:8px;font-size:.82rem">${displayAddr}</div>
        <div style="margin-bottom:4px"><span style="color:#6b6760;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em">Council</span><br><strong>CD ${cdNum}${cdInfo ? ' · ' + cdInfo[0] : ''}</strong></div>
        <div style="margin-bottom:4px"><span style="color:#6b6760;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em">Community Board</span><br><strong>${boroName} CB ${cbNum}</strong></div>
        <div style="margin-bottom:4px"><span style="color:#6b6760;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em">Assembly</span><br><strong>AD ${saNum}${saInfo ? ' · ' + saInfo[0] : ''}</strong></div>
        <div style="margin-bottom:4px"><span style="color:#6b6760;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em">State Senate</span><br><strong>SD ${ssNum}${ssInfo ? ' · ' + ssInfo[0] : ''}</strong></div>
        <div><span style="color:#6b6760;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em">Congress</span><br><strong>NY-${congNum}${congInfo ? ' · ' + congInfo[0] : ''}</strong></div>
      </div>`;

    document.getElementById('split-container').style.display = 'block';
    results.style.display = 'block';
    if (lat && lng) initMap(lat, lng, displayAddr, popupHtml);

    // State reps
    const saNum = parseInt(a.stateLegislativeDistrict || a.assemblyDistrict || 0);
    const ssNum = parseInt(a.stateSenatorialDistrict || 0);
    const congNum = parseInt(a.congressionalDistrict || 0);
    const saInfo = NY_ASSEMBLY[saNum];
    const ssInfo = NY_SENATE[ssNum];
    const congInfo = NY_CONGRESS[congNum];

    const addr = displayAddr;

    function repCard(color, label, distNum, name, url, distLabel) {
      return `<div class="district-card" style="border-left-color:${color}">
        <div class="dc-type" style="color:${color}">${label}</div>
        <div class="dc-compact">${distLabel} ${distNum}${name ? ' · ' + name : ''}</div>
        ${url ? `<a href="${url}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:${color};color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit Representative's Page ↗</a>` : ''}
      </div>`;
    }

    results.style.display = 'block';
    results.innerHTML = `
      <div class="result-block">
        <div class="result-label">Representation for</div>
        <div class="result-addr">${addr}</div>

        <div style="font-size:.7rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);font-weight:700;margin:16px 0 8px">City Government</div>

        <div class="district-card" style="border-left-color:#6b6760">
          <div class="dc-type" style="color:#6b6760">Community Board</div>
          <div class="dc-compact">${boroName} Community Board ${cbNum}</div>
          <div style="font-size:.75rem;color:#6b6760;margin-top:4px;line-height:1.5">Advisory body for land use, budgets &amp; local services.</div>
          <a href="${cbUrl}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:#6b6760;color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit Community Board ↗</a>
        </div>

        <div class="district-card" style="border-left-color:#0d7490">
          <div class="dc-type" style="color:#0d7490">NYC City Council</div>
          <div class="dc-compact">District ${cdNum}${cdInfo ? ' · ' + cdInfo[0] : ''}</div>
          <div style="font-size:.75rem;color:#6b6760;margin-top:4px;line-height:1.5">Passes local laws, approves the city budget, final say on land use.</div>
          ${cdInfo ? `<a href="${cdInfo[1]}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:#0d7490;color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit Council Member's Page ↗</a>` : ''}
        </div>

        <div style="font-size:.7rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);font-weight:700;margin:16px 0 8px">State Government</div>

        <div class="district-card" style="border-left-color:#1a7a4a">
          <div class="dc-type" style="color:#1a7a4a">NY State Assembly</div>
          <div class="dc-compact">District ${saNum}${saInfo ? ' · ' + saInfo[0] : ''}</div>
          <div style="font-size:.75rem;color:#6b6760;margin-top:4px;line-height:1.5">Lower house of the NY State Legislature. Represents your neighborhood in Albany.</div>
          ${saInfo ? `<a href="${saInfo[1]}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:#1a7a4a;color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit Assembly Member's Page ↗</a>` : ''}
        </div>

        <div class="district-card" style="border-left-color:#6b21a8">
          <div class="dc-type" style="color:#6b21a8">NY State Senate</div>
          <div class="dc-compact">District ${ssNum}${ssInfo ? ' · ' + ssInfo[0] : ''}</div>
          <div style="font-size:.75rem;color:#6b6760;margin-top:4px;line-height:1.5">Upper house of the NY State Legislature. Confirms gubernatorial appointments and passes state law.</div>
          ${ssInfo ? `<a href="${ssInfo[1]}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:#6b21a8;color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit State Senator's Page ↗</a>` : ''}
        </div>

        <div style="font-size:.7rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);font-weight:700;margin:16px 0 8px">Federal Government</div>

        <div class="district-card" style="border-left-color:#b91c1c">
          <div class="dc-type" style="color:#b91c1c">U.S. House of Representatives</div>
          <div class="dc-compact">NY-${congNum}${congInfo ? ' · ' + congInfo[0] : ''}</div>
          <div style="font-size:.75rem;color:#6b6760;margin-top:4px;line-height:1.5">Represents your congressional district in Washington D.C. Two-year terms.</div>
          ${congInfo ? `<a href="${congInfo[1]}" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;border-radius:6px;background:#b91c1c;color:#fff;font-size:.75rem;font-weight:700;text-decoration:none">Visit Representative's Page ↗</a>` : ''}
        </div>

        <div class="district-card" style="border-left-color:#1d4ed8">
          <div class="dc-type" style="color:#1d4ed8">U.S. Senate</div>
          <div class="dc-compact">New York</div>
          <div style="font-size:.75rem;color:#444;margin-top:4px;line-height:1.5">
            <strong>Chuck Schumer</strong> (Senior Senator) &nbsp;·&nbsp;
            <a href="https://www.schumer.senate.gov" target="_blank" style="color:#1d4ed8;font-weight:600">schumer.senate.gov ↗</a>
          </div>
          <div style="font-size:.75rem;color:#444;margin-top:6px;line-height:1.5">
            <strong>Kirsten Gillibrand</strong> (Junior Senator) &nbsp;·&nbsp;
            <a href="https://www.gillibrand.senate.gov" target="_blank" style="color:#1d4ed8;font-weight:600">gillibrand.senate.gov ↗</a>
          </div>
        </div>

      </div>`;
  } catch(err) {
    spinner.style.display = 'none';
    error.textContent = 'Lookup failed. Please try again.';
    error.style.display = 'block';
  }
}
// Auto-run from URL params (e.g. from orgchart page)
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const addr = params.get('address');
  const boro = params.get('borough');
  if (addr) {
    document.getElementById('addrInput').value = addr;
    if (boro) setBoro(boro);
    lookup();
  }
});
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let districtMap = null;
let mapMarker = null;

function initMap(lat, lng, label, popupHtml) {
  const container = document.getElementById('map-container');

  if (!districtMap) {
    districtMap = L.map('map-container').setView([lat, lng], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      maxZoom: 19
    }).addTo(districtMap);
  } else {
    districtMap.setView([lat, lng], 15);
    if (mapMarker) districtMap.removeLayer(mapMarker);
  }

  const icon = L.divIcon({
    className: '',
    html: `<div style="background:#f47920;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });

  mapMarker = L.marker([lat, lng], {icon}).addTo(districtMap)
    .bindPopup(popupHtml || label, {maxWidth: 240})
    .openPopup();

  setTimeout(() => districtMap.invalidateSize(), 150);
}
</script>
</body>
</html>
