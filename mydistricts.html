<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Brooklyn Community Board 6">
<meta property="og:title" content="Find Your District — CB6">
<meta property="og:description" content="Enter any NYC address to find your City Council Member and Community Board.">
<meta property="og:image" content="https://cb6brooklyn.github.io/bkcb6/icon-address.png">
<meta property="og:url" content="https://cb6brooklyn.github.io/bkcb6/mydistricts.html">
<title>🔍 Find Your District — CB6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--navy:#0d1b4b;--orange:#f47920;--border:#e5e2db;--muted:#6b6760;--off:#f8f7f4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--navy);min-height:100vh}
header{background:var(--navy);border-bottom:4px solid var(--orange);padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{color:#fff;font-size:1rem;font-weight:700}
header h1 span{color:var(--orange)}
.back{background:none;border:none;color:rgba(255,255,255,.75);font-size:.8rem;font-weight:600;cursor:pointer;padding:0}
.hero{background:var(--navy);padding:24px 20px 28px}
.hero h2{color:#fff;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.6);font-size:.82rem;line-height:1.6;margin-bottom:20px}
.search-row{display:flex;gap:8px;flex-wrap:wrap}
.addr-input{flex:1;min-width:0;padding:12px 14px;border:2px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none}
.addr-input::placeholder{color:rgba(255,255,255,.4)}
.addr-input:focus{border-color:var(--orange)}
.search-btn{padding:12px 20px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;white-space:nowrap}
.borough-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.boro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:none;color:rgba(255,255,255,.65);font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.boro-btn.active{background:rgba(255,255,255,.15);border-color:#fff;color:#fff}
.note{color:rgba(255,255,255,.4);font-size:.72rem;margin-top:10px;font-family:'DM Mono',monospace}
.spinner{color:rgba(255,255,255,.5);font-size:.8rem;font-family:'DM Mono',monospace;padding:8px 0;display:none}
.error{color:#fca5a5;font-size:.82rem;font-family:'DM Mono',monospace;padding:8px 0;display:none}
.results{background:#fff}
.result-block{padding:20px;border-bottom:1px solid var(--border)}
.result-label{font-size:.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);font-weight:700;margin-bottom:8px}
.result-addr{font-size:.82rem;color:var(--muted);margin-bottom:16px;font-family:'DM Mono',monospace}
.district-card{background:var(--off);border-radius:10px;padding:16px;margin-bottom:12px;border-left:4px solid var(--orange)}
.district-card.cb{border-left-color:#1d4ed8}
.dc-type{font-size:.62rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.dc-num{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:2px}
.dc-name{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.dc-sub{font-size:.75rem;color:var(--muted);line-height:1.5;margin-bottom:8px}
.dc-link{display:inline-block;padding:7px 14px;background:var(--navy);color:#fff;border-radius:6px;font-size:.78rem;font-weight:700;text-decoration:none}
.dc-link:hover{background:var(--orange)}
.dc-link.orange{background:var(--orange)}
footer{padding:20px;font-size:.72rem;color:rgba(255,255,255,.4);text-align:center;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<header>
  <button class="back" onclick="window.location.href='index.html'">&#8592; Home</button>
  <h1>Brooklyn <span>Community Board 6</span></h1>
</header>

<div class="hero">
  <h2>Find Your District</h2>
  <p>Enter any NYC address to find your City Council Member and Community Board.</p>
  <div class="search-row">
    <input type="text" class="addr-input" id="addrInput" placeholder="e.g. 250 Baltic Street"
      onkeydown="if(event.key==='Enter') lookup()">
    <button class="search-btn" onclick="lookup()">Look Up</button>
  </div>
  <div class="borough-row">
    <button class="boro-btn active" id="boro-Brooklyn" onclick="setBoro('Brooklyn')">Brooklyn</button>
    <button class="boro-btn" id="boro-Manhattan" onclick="setBoro('Manhattan')">Manhattan</button>
    <button class="boro-btn" id="boro-Queens" onclick="setBoro('Queens')">Queens</button>
    <button class="boro-btn" id="boro-Bronx" onclick="setBoro('Bronx')">Bronx</button>
    <button class="boro-btn" id="boro-Staten Island" onclick="setBoro('Staten Island')">Staten Island</button>
  </div>
  <div class="note">Data: NYC Geoclient API</div>
  <div class="spinner" id="spinner">Looking up address...</div>
  <div class="error" id="error"></div>
</div>

<div class="results" id="results" style="display:none"></div>

<footer>Brooklyn Community Board 6 · 250 Baltic Street, Brooklyn, NY 11201</footer>

  37:["Sandy Nurse","https://council.nyc.gov/district-37/","Brooklyn"],

  39:["Shahana Hanif","https://council.nyc.gov/district-39/","Brooklyn"],
  40:["Rita Joseph","https://council.nyc.gov/district-40/","Brooklyn"],
  41:["Darlene Mealy","https://council.nyc.gov/district-41/","Brooklyn"],
  42:["Chris Banks","https://council.nyc.gov/district-42/","Brooklyn"],
  43:["Susan Zhuang","https://council.nyc.gov/district-43/","Brooklyn"],
  44:["Simcha Felder","https://council.nyc.gov/district-44/","Brooklyn"],
  45:["Farah N. Louis","https://council.nyc.gov/district-45/","Brooklyn"],
  46:["Mercedes Narcisse","https://council.nyc.gov/district-46/","Brooklyn"],
  47:["Kayla Santosuosso","https://council.nyc.gov/district-47/","Brooklyn"],
  48:["Inna Vernikov","https://council.nyc.gov/district-48/","Brooklyn"],
  49:["Kamillah Hanks","https://council.nyc.gov/district-49/","Staten Island"],
  50:["David Carr","https://council.nyc.gov/district-50/","Staten Island"],
  51:["Frank Morano","https://council.nyc.gov/district-51/","Staten Island"]
};

// Community Board websites by borough code + number
// Borough codes: 1=Manhattan,2=Bronx,3=Brooklyn,4=Queens,5=Staten Island
const CB_URLS = {
  "1-1":"https://www1.nyc.gov/site/manhattancb1/index.page",
  "1-2":"https://cbmanhattan.cityofnewyork.us/cb2/",
  "1-3":"http://www.nyc.gov/manhattancb3",
  "1-4":"https://cbmanhattan.cityofnewyork.us/cb4/",
  "1-5":"http://www.cb5.org/",
  "1-6":"http://cbsix.org/",
  "1-7":"http://www.nyc.gov/mcb7",
  "1-8":"http://www.cb8m.com",
  "1-9":"https://www.cb9m.org",
  "1-10":"https://cbmanhattan.cityofnewyork.us/cb10/",
  "1-11":"http://www.cb11m.org",
  "1-12":"https://cbmanhattan.cityofnewyork.us/cb12/",
  "2-1":"https://www1.nyc.gov/site/bronxcb1/index.page",

  "2-3":"https://www1.nyc.gov/site/bronxcb3/index.page",

  "2-6":"https://cbbronx.cityofnewyork.us/cb6/",

  "2-9":"http://www.nyc.gov/html/bxcb9/html/home/home.shtml",
  "2-10":"https://www1.nyc.gov/site/bronxcb10/index.page",
  "2-11":"https://www1.nyc.gov/site/bronxcb11/index.page",
  "2-12":"https://www1.nyc.gov/site/bronxcb12/index.page",
  "3-1":"https://www1.nyc.gov/site/brooklyncb1/index.page",
  "3-2":"https://www1.nyc.gov/site/brooklyncb2/index.page",
  "3-3":"https://www1.nyc.gov/site/brooklyncb3/index.page",
  "3-4":"https://www1.nyc.gov/site/brooklyncb4/index.page",
  "3-5":"https://www.brooklyncb5.org/",
  "3-6":"https://bkcb6.app",
  "3-7":"http://www1.nyc.gov/site/brooklyncb7/index.page",
  "3-8":"https://www.brooklyncb8.org/",
  "3-9":"https://cbbrooklyn.cityofnewyork.us/cb9/",
  "3-10":"https://cbbrooklyn.cityofnewyork.us/cb10/",
  "3-11":"http://www.brooklyncb11.org/",
  "3-12":"http://www.brooklyncb12.org/",
  "3-13":"http://www1.nyc.gov/site/brooklyncb13/index.page",
  "3-14":"http://www.cb14brooklyn.com/",
  "3-15":"http://www1.nyc.gov/site/brooklyncb15/index.page",

  "3-17":"https://cbbrooklyn.cityofnewyork.us/cb17/",
  "3-18":"https://www1.nyc.gov/site/brooklyncb18/index.page",

  "4-4":"https://www1.nyc.gov/site/queenscb4/index.page",

  "4-8":"https://www1.nyc.gov/site/queenscb8/index.page",
  "4-9":"https://www1.nyc.gov/site/queenscb9/index.page",
  "4-10":"https://www1.nyc.gov/site/queenscb10/index.page",
  "4-11":"https://www1.nyc.gov/site/queenscb11/index.page",
  "4-12":"https://www1.nyc.gov/site/queenscb12/index.page",
  "4-13":"https://www1.nyc.gov/site/queenscb13/index.page",
  "4-14":"https://www1.nyc.gov/site/queenscb14/index.page",
  "5-1":"http://www.nyc.gov/sicb1",
  "5-2":"https://www1.nyc.gov/site/statenislandcb2/index.page",
  "5-3":"http://www.nyc.gov/sicb3"
};

const BORO_NAMES = {1:"Manhattan",2:"Bronx",3:"Brooklyn",4:"Queens",5:"Staten Island"};
const BORO_CODES = {"Manhattan":1,"Bronx":2,"Brooklyn":3,"Queens":4,"Staten Island":5};

function setBoro(b) {
  currentBoro = b;
  document.querySelectorAll('.boro-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('boro-' + b).classList.add('active');
}

async function lookup() {
  const input = document.getElementById('addrInput').value.trim();
  if (!input) return;
  const spinner = document.getElementById('spinner');
  const error = document.getElementById('error');
  const results = document.getElementById('results');
  spinner.style.display = 'block';
  error.style.display = 'none';
  results.style.display = 'none';

  // Parse house number and street
  const m = input.match(/^(\d+[-\d]*)\s+(.+)$/);
  if (!m) {
    spinner.style.display = 'none';
    error.textContent = 'Please enter a full address, e.g. "250 Baltic Street"';
    error.style.display = 'block';
    return;
  }
  const houseNum = m[1];
  const street = m[2];

  try {
    const url = `https://api.nyc.gov/geoclient/v2/address.json?houseNumber=${encodeURIComponent(houseNum)}&street=${encodeURIComponent(street)}&borough=${encodeURIComponent(currentBoro)}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const a = data.address;
    spinner.style.display = 'none';

    if (!a || a.message || !a.cityCouncilDistrict) {
      error.textContent = 'Address not found. Check the address and borough and try again.';
      error.style.display = 'block';
      return;
    }

    const cdNum = parseInt(a.cityCouncilDistrict);
    const cdInfo = COUNCIL[cdNum];
    const cbRaw = a.communityDistrict; // e.g. "06" or "6"
    const cbNum = parseInt(cbRaw);
    const boroCode = BORO_CODES[currentBoro];
    const cbKey = boroCode + '-' + cbNum;
    const cbUrl = CB_URLS[cbKey] || '#';
    const boroName = BORO_NAMES[boroCode];
    const displayAddr = (a.houseNumber||houseNum) + ' ' + (a.firstStreetNameNormalized||street) + ', ' + (a.uspsPreferredCityName||currentBoro) + ', NY ' + (a.zipCode||'');

    results.style.display = 'block';
    results.innerHTML = `
      <div class="result-block">
        <div class="result-label">Results for</div>
        <div class="result-addr">${displayAddr}</div>

        <div class="district-card">
          <div class="dc-type">City Council</div>
          <div class="dc-num">District ${cdNum}</div>
          ${cdInfo ? `<div class="dc-name">${cdInfo[0]}</div>` : ''}
          ${cdInfo ? `<div class="dc-sub">${cdInfo[2]}</div>` : ''}
          ${cdInfo ? `<a class="dc-link orange" href="${cdInfo[1]}" target="_blank">Visit Council Member's Page ↗</a>` : ''}
        </div>

        <div class="district-card cb">
          <div class="dc-type">Community Board</div>
          <div class="dc-num">${boroName} CB ${cbNum}</div>
          <div class="dc-sub">${boroName} Community Board ${cbNum}</div>
          <a class="dc-link" href="${cbUrl}" target="_blank" style="background:#1d4ed8">Visit Community Board's Page ↗</a>
        </div>
      </div>`;
  } catch(err) {
    spinner.style.display = 'none';
    error.textContent = 'Lookup failed. Please try again.';
    error.style.display = 'block';
  }
}
</script>
</body>
</html>
