<html lang="en">
<head>

<title>BKCB6 · Reference Guide & Library</title>
<meta property="og:title" content="BKCB6 Reference Guide & Library">
<meta property="og:description" content="Brooklyn Community Board 6 reference guide and library — government directory, guides, and recommended reading.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=DM+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;min-height:100vh;font-family:'DM Sans',sans-serif;overflow-x:hidden}
.wall{
  background:
    repeating-linear-gradient(90deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 1px,transparent 30px),
    linear-gradient(160deg,#2c1810 0%,#1a0e08 40%,#0d0804 100%);
  min-height:100vh;
  padding:0 0 60px;
}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:rgba(245,226,122,.65);font-family:'DM Mono',monospace;font-size:.72rem;text-decoration:none;padding:12px 16px;letter-spacing:.04em}
.back-btn:hover{color:#f5e27a}
.library-sign{text-align:center;padding:24px 20px 20px;position:relative}
.library-sign-inner{
  display:inline-block;
  background:linear-gradient(135deg,#7a5a10 0%,#c9a227 35%,#8B6914 70%,#a07820 100%);
  border:3px solid #c9a22788;
  border-radius:6px;
  padding:16px 36px 12px;
  box-shadow:0 4px 28px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;
}
.library-sign-inner::before,.library-sign-inner::after{content:'◆';position:absolute;top:50%;transform:translateY(-50%);color:#f5e27a88;font-size:12px}
.library-sign-inner::before{left:10px}.library-sign-inner::after{right:10px}
.library-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:#fff8e7;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.library-subtitle{font-family:'DM Mono',monospace;font-size:.58rem;color:#f5e27a99;letter-spacing:.18em;text-transform:uppercase;margin-top:5px}
.bookcase{margin:0 12px 28px;background:linear-gradient(to bottom,#3d2008,#2a1504);border-radius:8px;border:2px solid #5a3010;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden}
.bc-hdr{padding:11px 16px 9px;border-bottom:2px solid #5a3010;background:linear-gradient(to bottom,#4a2808,#3a1e06)}
.bc-hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.bc-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:#f5e27a;letter-spacing:.04em}
.bc-sub{font-size:.58rem;font-family:'DM Mono',monospace;color:#c9a22777;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.bc-search{flex:1;min-width:150px;padding:7px 11px;background:#1a0e08;border:1.5px solid #5a3010;border-radius:6px;color:#f5e27a;font-family:'DM Mono',monospace;font-size:.78rem;outline:none;width:100%}
.bc-search::placeholder{color:#6b4f10}.bc-search:focus{border-color:#c9a227}
.bc-cats{display:flex;gap:4px;flex-wrap:wrap;padding:6px 16px 8px}
.bc-cat{padding:4px 9px;border-radius:999px;border:1px solid #5a3010;background:#2a1504;font-family:'DM Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;color:#c9a227;white-space:nowrap;transition:all .15s}
.bc-cat.on{background:#c9a227;color:#1a0e08;border-color:#c9a227}
.bc-cat:hover:not(.on){background:#3a1e06}
.bc-count{font-size:.6rem;font-family:'DM Mono',monospace;color:#6b4f10;padding:3px 16px 6px}
.bc-shelf-wrap{}
.bc-shelf{background:linear-gradient(to bottom,#f0e8d4,#e8ddc8);padding:16px 12px 0;display:flex;gap:3px;flex-wrap:nowrap;align-items:flex-end;overflow-x:auto;box-shadow:inset 0 6px 12px rgba(0,0,0,.08)}
.bc-plank{background:linear-gradient(to bottom,#8B6914,#6b4f0f,#7a5c12);height:12px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.bc-supports{display:flex;justify-content:space-between;padding:0 10px;background:#2a1504}
.bc-support{width:16px;height:10px;background:#4a2808;border-radius:0 0 3px 3px}
.bc-div{width:22px;flex-shrink:0;align-self:stretch;background:rgba(0,0,0,.28);margin:6px 6px 0;border-radius:3px;display:flex;align-items:center;justify-content:center;z-index:5;box-shadow:1px 0 5px rgba(0,0,0,.25)}
.bc-div-lbl{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px}
.bc-div-lbl span{font-size:7.5px;font-family:'DM Mono',monospace;font-weight:800;color:rgba(255,255,255,.95);letter-spacing:.05em;text-transform:uppercase;line-height:1.15;text-align:center}
.bc-spine{flex-shrink:0;cursor:pointer;position:relative;width:38px}
.bc-spine-inner{width:38px;height:140px;border-radius:4px 4px 2px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.bc-spine:hover .bc-spine-inner{transform:translateY(-8px)}
.bc-spine-cap{position:absolute;top:0;left:0;right:0;height:5px;z-index:2}
.bc-spine-cap-bot{position:absolute;bottom:0;left:0;right:0;height:3px;opacity:.7;z-index:2}
.bc-spine-crease{position:absolute;left:5px;top:8px;bottom:7px;width:1.5px;border-radius:1px}
.bc-spine-text{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:7px 3px;max-height:126px;overflow:hidden;z-index:1}
.bc-card{position:absolute;top:0;left:42px;width:165px;background:#fff;border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,.3);padding:12px;z-index:100;animation:bcFlip .18s ease-out forwards;transform-origin:left center;display:none}
.bc-card.show{display:block}
.bc-card-cat{font-size:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.bc-card-name{font-size:11px;font-weight:700;color:#132D65;line-height:1.3;margin-bottom:8px;font-family:'DM Sans',sans-serif}
.bc-card-title{font-size:12px;font-weight:800;line-height:1.3;margin-bottom:3px;font-family:'Playfair Display',serif}
.bc-card-author{font-size:10px;color:#555;margin-bottom:6px;font-family:'DM Mono',monospace}
.bc-card-desc{font-size:10px;color:#444;line-height:1.45;margin-bottom:8px;font-family:'DM Sans',sans-serif}
.bc-card-link{display:block;text-align:center;padding:6px 0;color:#fff;border-radius:6px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;text-decoration:none}
.bc-cover{flex-shrink:0;cursor:pointer;position:relative;margin-right:6px;align-self:flex-end}
.bc-cover-img{display:block;border-radius:3px 5px 5px 3px;object-fit:contain;background:#0E224F;transition:transform .2s,box-shadow .2s}
.bc-cover:hover .bc-cover-img{transform:translateY(-10px)}
.bc-book-spine{flex-shrink:0;cursor:pointer;position:relative;width:38px}
.bc-book-inner{width:38px;height:140px;border-radius:4px 4px 2px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.bc-book-spine:hover .bc-book-inner{transform:translateY(-8px)}
.dim .bc-spine-inner,.dim .bc-cover-img,.dim .bc-book-inner{opacity:.15}
.match .bc-spine-inner{box-shadow:0 0 0 2.5px #f5c842,0 -8px 20px rgba(245,200,66,.55)!important;transform:translateY(-9px)}
.match .bc-cover-img{box-shadow:0 0 0 3px #f5c842,0 -10px 26px rgba(245,200,66,.6),4px 4px 16px rgba(0,0,0,.35),-2px 0 0 #F47920!important;transform:translateY(-10px)!important}
@keyframes bcFlip{from{transform:rotateY(-90deg) scaleX(.3);opacity:0}to{transform:none;opacity:1}}
</style>
</head>

<div class="wall" id="wall">

    <div class="library-subtitle">Brooklyn Community Board 6</div>
  </div>

<!-- Bookcase 1: Government Directory -->
<div class="bookcase">

    <div class="bc-hdr-top">
      <div>
        <div class="bc-title">📋 Government Directory</div>
        <div class="bc-sub">228 NYC government contacts</div>
      </div>
    </div>
    <!-- Address search -->
    <div style="margin-bottom:8px">

      <div style="display:flex;gap:8px">
        <input class="bc-search" id="lib-addr" type="text" placeholder="e.g. 250 Baltic St, Brooklyn" style="flex:1" onkeydown="if(event.key==='Enter')libAddrSearch()">
        <button id="lib-addr-btn" onclick="libAddrSearch()" style="padding:7px 13px;background:#c9a227;color:#1a0e08;border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:.78rem;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0">Search</button>
      </div>
      <div id="lib-addr-err" style="display:none;margin-top:5px;font-size:.72rem;font-family:'DM Mono',monospace;color:#c0392b"></div>
    </div>
    <!-- Name/district search -->
    <input class="bc-search" id="el-search" type="text" placeholder="Or search by name or district…" oninput="elRender()">
  </div>
  <div id="lib-addr-results"></div>
  <div class="bc-cats" id="el-cats"></div>
  <div class="bc-count" id="el-count"></div>
  <div id="el-shelves"></div>
</div>

<!-- Bookcase 2: Recommended Reading -->
<div class="bookcase">
  <div class="bc-hdr">
    <div class="bc-hdr-top">
      <div>
        <div class="bc-title">📚 Recommended Reading</div>
        <div class="bc-sub">Civic life, cities &amp; democracy</div>
      </div>
      <input class="bc-search" id="rd-search" type="text" placeholder="Search title or author…" oninput="rdRender()">
    </div>
  </div>
  <div class="bc-count" id="rd-count"></div>
  <div id="rd-shelves"></div>
</div>

const W=38, H=140, CW=83, CH=148;

// Build category buttons
const elCatsEl = document.getElementById('el-cats');
EL_CATS.forEach(c => {
  const b=document.createElement('button');
  b.className='bc-cat'+(c==='All'?' on':'');
  b.textContent=(CAT_ICONS[c]||'')+' '+c;
  b.onclick=()=>{
    document.querySelectorAll('#el-cats .bc-cat').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); elCat=c; elOpen=null; elRender();
  };
  elCatsEl.appendChild(b);
});

function elRender() {
  const q=(document.getElementById('el-search').value||'').toLowerCase();
  const filteredReal = EL_TILES.filter(t=>!t.isDivider&&(elCat==='All'||t.category===elCat)&&(!q||t.alt.toLowerCase().includes(q)||(t.spine||'').toLowerCase().includes(q)));
  // Reinsert dividers
  const filtered=[]; let lastSec=null;
  const secOf=t=>t.category==='U.S. Congress'?'US House':t.category==='Citywide'?({'mamdani':'NYC Officials','williams':'NYC Officials','levine':'NYC Officials','hochul':'NYS Officials','dinapoli':'NYS Officials','schumer':'US Senators','gillibrand':'US Senators'}[t.matchKey]||'Citywide'):t.category;
  filteredReal.forEach(t=>{
    const sec=secOf(t);
    if(sec!==lastSec){const d=EL_TILES.find(x=>x.isDivider&&x.section===sec);if(d)filtered.push(d);lastSec=sec;}
    filtered.push(t);
  });
  document.getElementById('el-count').textContent=filteredReal.length+' on shelf';
  const shelves=[]; for(let i=0;i<filtered.length;i+=EL_SHELF) shelves.push(filtered.slice(i,i+EL_SHELF));
  const dom=document.getElementById('el-shelves'); dom.innerHTML='';
  shelves.forEach((shelf,si)=>{
    const wrap=document.createElement('div'); wrap.className='bc-shelf-wrap';
    const shelfEl=document.createElement('div'); shelfEl.className='bc-shelf';
    shelfEl.style.minHeight=(si===0?CH+28:H+28)+'px';
    shelf.forEach((tile,bi)=>{
      if(tile.isDivider){shelfEl.appendChild(mkDiv(tile));return;}
      const gi=si*EL_SHELF+bi;
      shelfEl.appendChild(tile.isCB6?mkCover(tile,gi):mkSpine(tile,gi));
    });
    shelfEl.addEventListener('click',e=>e.stopPropagation());
    const plank=document.createElement('div'); plank.className='bc-plank';
    const sups=document.createElement('div'); sups.className='bc-supports';
    [0,1].forEach(()=>{const s=document.createElement('div');s.className='bc-support';sups.appendChild(s);});
    wrap.appendChild(shelfEl);wrap.appendChild(plank);wrap.appendChild(sups);
    dom.appendChild(wrap);
  });
}

function mkDiv(tile) {
  const d=document.createElement('div'); d.className='bc-div';
  const l=document.createElement('div'); l.className='bc-div-lbl';
  tile.label.split('\\n').forEach(ln=>{const s=document.createElement('span');s.textContent=ln;l.appendChild(s);});
  d.appendChild(l); return d;
}

function mkCover(tile,gi) {
  const el=document.createElement('div'); el.className='bc-cover'; el.title=tile.alt;
  const img=document.createElement('img'); img.className='bc-cover-img';
  img.src=tile.src; img.alt=tile.alt;
  img.style.cssText=`width:${CW}px;height:${CH}px;box-shadow:4px 4px 16px rgba(0,0,0,.35),-2px 0 0 #F47920`;
  img.onerror=()=>{img.style.background='#132D65';img.style.color='#fff';};
  const card=mkCard(tile,'#F47920','#132D65',true);
  el.appendChild(img); el.appendChild(card);
  el.addEventListener('click',e=>{e.stopPropagation();toggleCard(card,gi,'el');});
  return el;
}

function mkSpine(tile,gi) {
  const s=SCHEMES[tile.scheme]||SCHEMES.BK;
  const el=document.createElement('div'); el.className='bc-spine'; el.title=tile.alt;
  const inner=document.createElement('div'); inner.className='bc-spine-inner';
  const bg=s.split?`linear-gradient(to bottom,${s.spine} 50%,${s.split} 50%)`:s.white?'linear-gradient(to right,#f6f6f6,#fff,#f0f0f0)':`linear-gradient(105deg,${s.spine}e8 0%,${s.spine} 55%,${s.spine}cc 100%)`;
  inner.style.cssText=`background:${bg};${s.white&&!s.split?`border:2px solid ${s.cap}`:''};box-shadow:${s.white?'3px 0 7px rgba(0,0,0,.16)':'3px 0 7px rgba(0,0,0,.3),inset -2px 0 4px rgba(0,0,0,.16)'}`;
  const cap=document.createElement('div'); cap.className='bc-spine-cap'; cap.style.background=s.split?`linear-gradient(to right,${s.cap} 50%,${s.splitCap} 50%)`:s.cap;
  const capB=document.createElement('div'); capB.className='bc-spine-cap-bot'; capB.style.background=s.split?`linear-gradient(to right,${s.cap} 50%,${s.splitCap} 50%)`:s.cap;
  const crease=document.createElement('div'); crease.className='bc-spine-crease'; crease.style.background=s.white?`${s.cap}40`:'rgba(255,255,255,.13)';
  const tw=document.createElement('div'); tw.className='bc-spine-text'; tw.style.cssText=`display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 3px;max-height:${H-14}px;overflow:hidden;z-index:1`;
  const lines=(tile.spine||'').split('\\n');
  lines.forEach(line=>{
    const sp=document.createElement('span');
    sp.style.cssText=`font-size:8px;font-weight:700;color:${s.text};font-family:'DM Mono',monospace;line-height:1.2;text-align:center;max-width:${W-4}px;overflow:hidden;word-break:break-all;display:block;padding:0 2px`;
    sp.textContent=line; tw.appendChild(sp);
  });
  const card=mkCard(tile,s.white?s.cap:s.spine,s.cap,false);
  inner.appendChild(cap);inner.appendChild(capB);inner.appendChild(crease);inner.appendChild(tw);inner.appendChild(card);
  el.appendChild(inner);
  el.addEventListener('click',e=>{e.stopPropagation();toggleCard(card,gi,'el');});
  return el;
}

function mkCard(tile,borderColor,btnBg,isCover) {
  const card=document.createElement('div'); card.className='bc-card'; card.style.borderColor=borderColor;
  card.addEventListener('click',e=>e.stopPropagation());
  if(tile.category){const cat=document.createElement('div');cat.className='bc-card-cat';cat.style.color=borderColor;cat.textContent=(CAT_ICONS[tile.category]||'')+' '+tile.category;card.appendChild(cat);}
  const img=document.createElement('img');img.src=tile.src;img.alt=tile.alt||tile.title||'';img.style.cssText='width:100%;display:block;border-radius:7px;margin-bottom:7px';img.onerror=()=>img.style.display='none';card.appendChild(img);
  if(tile.alt){const n=document.createElement('div');n.className='bc-card-name';n.textContent=tile.alt;card.appendChild(n);}
  if(tile.title){const t=document.createElement('div');t.className='bc-card-title';t.style.color=borderColor;t.textContent=tile.title;card.appendChild(t);}
  if(tile.author){const a=document.createElement('div');a.className='bc-card-author';a.textContent=tile.author+(tile.year?' · '+tile.year:'');card.appendChild(a);}
  if(tile.desc){const d=document.createElement('div');d.className='bc-card-desc';d.textContent=tile.desc;card.appendChild(d);}
  const link=document.createElement('a');link.className='bc-card-link';link.href=tile.href;link.target='_blank';link.rel='noopener noreferrer';link.style.background=btnBg;link.textContent='Visit →';card.appendChild(link);
  return card;
}

let elOpenCard=null, elOpenIdx=null;
function toggleCard(card,gi,ns) {
  if(ns==='el'){
    if(elOpenCard&&elOpenCard!==card){elOpenCard.classList.remove('show');}
    elOpenIdx=elOpenIdx===gi?null:gi;
    card.classList.toggle('show',elOpenIdx!==null);
    elOpenCard=elOpenIdx!==null?card:null;
  } else {
    if(rdOpenCard&&rdOpenCard!==card){rdOpenCard.classList.remove('show');}
    rdOpenIdx=rdOpenIdx===gi?null:gi;
    card.classList.toggle('show',rdOpenIdx!==null);
    rdOpenCard=rdOpenIdx!==null?card:null;
  }
}

async function libAddrSearch() {

  const errEl = document.getElementById('lib-addr-err');
  const btn   = document.getElementById('lib-addr-btn');
  const panel = document.getElementById('lib-addr-results');
  errEl.style.display='none'; panel.innerHTML='';
  if(!input) return;

  const hm = input.match(/^(\d+[A-Za-z]?)\s+(.+)/);
  if(!hm) { errEl.textContent='Try: 250 Baltic St, Brooklyn'; errEl.style.display='block'; return; }

  const hn = hm[1];
  let st = hm[2].replace(/,?\s*(brooklyn|manhattan|queens|bronx|staten island|new york|ny)\b.*/i,'').trim();
  const bmap={brooklyn:'Brooklyn',bronx:'Bronx',manhattan:'Manhattan',queens:'Queens','staten island':'Staten Island'};
  let boro='Brooklyn';
  for(const[k,v] of Object.entries(bmap)){if(input.toLowerCase().includes(k)){boro=v;break;}}

  btn.disabled=true; btn.textContent='…';
  try {
    const url=`https://api.nyc.gov/geoclient/v2/address.json?houseNumber=${encodeURIComponent(hn)}&street=${encodeURIComponent(st)}&borough=${encodeURIComponent(boro)}`;
    const resp=await fetch(url,{headers:{'Ocp-Apim-Subscription-Key':LIB_API_KEY}});
    const data=await resp.json();
    const a=data.address;
    if(!a||a.geosupportReturnCode2==='11') throw new Error('Address not found. Try full street name.');
    const bcd=a.communityDistrict;
    if(!bcd) throw new Error('District not found.');

    const bd=bcd.charAt(0), cbNum=parseInt(bcd.slice(1));
    const pfxMap={'3':'CB','2':'BX_CB','1':'MN_CB','4':'QN_CB','5':'SI_CB'};
    const pfx=pfxMap[bd]||'CB';
    const ed = a.electionDistrict ? parseInt(a.electionDistrict) : null;

    // Build reps list in order: ED, CB, Council, Assembly, Senate, House
    const reps = [];
    if(ed) reps.push({label:'Election District',sub:`ED ${ed}`,src:null,href:null,special:'ed'});

    const cbKey=pfx+cbNum+'_540';
    const cbTile=EL_TILES.find(t=>t.matchKey===cbKey);
    if(cbTile) reps.push({label:'Community Board',sub:cbTile.spine.replace(/\\n/g,' '),src:cbTile.src,href:cbTile.href,scheme:cbTile.scheme});

    if(a.cityCouncilDistrict){const t=EL_TILES.find(x=>x.matchKey===`CD${parseInt(a.cityCouncilDistrict)}`);if(t) reps.push({label:'City Council',sub:t.spine.replace(/\\n/g,' '),src:t.src,href:t.href,scheme:t.scheme});}
    if(a.assemblyDistrict){const t=EL_TILES.find(x=>x.matchKey===`AD${parseInt(a.assemblyDistrict)}`);if(t) reps.push({label:'State Assembly',sub:t.spine.replace(/\\n/g,' '),src:t.src,href:t.href,scheme:t.scheme});}
    if(a.stateSenatorialDistrict){const t=EL_TILES.find(x=>x.matchKey===`SD${parseInt(a.stateSenatorialDistrict)}`);if(t) reps.push({label:'State Senate',sub:t.spine.replace(/\\n/g,' '),src:t.src,href:t.href,scheme:t.scheme});}
    if(a.congressionalDistrict){const ck=LIB_CONGRESS_MAP[parseInt(a.congressionalDistrict)];const t=ck?EL_TILES.find(x=>x.matchKey===ck):null;if(t) reps.push({label:'US House',sub:t.spine.replace(/\\n/g,' '),src:t.src,href:t.href,scheme:t.scheme});}

    // Render panel
    const wrap=document.createElement('div');
    wrap.style.cssText='background:rgba(0,0,0,.3);border-top:1px solid #5a3010;padding:14px 16px 16px';

    const hdrDiv=document.createElement('div');
    hdrDiv.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
    hdrDiv.innerHTML=`<div style="font-size:.7rem;font-family:'DM Mono',monospace;font-weight:700;color:#c9a227;text-transform:uppercase;letter-spacing:.08em">${a.houseNumberDisplay||hn} ${a.streetName||st}</div><button onclick="document.getElementById('lib-addr-results').innerHTML='';document.getElementById('lib-addr').value=''" style="background:rgba(255,255,255,.1);border:none;border-radius:4px;color:#c9a22788;padding:3px 8px;cursor:pointer;font-size:.65rem;font-family:'DM Mono',monospace">✕</button>`;
    wrap.appendChild(hdrDiv);

    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:10px';

    reps.forEach(rep => {
      const s=rep.scheme?(SCHEMES[rep.scheme]||SCHEMES.BK):null;
      const borderColor=s?s.cap:'#c9a227';
      const cell=document.createElement('div');
      cell.style.cssText='display:flex;flex-direction:column;align-items:center;gap:3px';

      if(rep.special==='ed') {
        const box=document.createElement('div');
        box.style.cssText=`width:100%;aspect-ratio:1/1;background:#132D65;border:2.5px solid #F47920;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px`;
        box.innerHTML=`<span style="font-size:.5rem;font-family:'DM Mono',monospace;color:#F47920;text-transform:uppercase;letter-spacing:.05em">Election</span><span style="font-size:.5rem;font-family:'DM Mono',monospace;color:#F47920;text-transform:uppercase;letter-spacing:.05em">District</span><span style="font-size:1.1rem;font-weight:800;color:#fff;font-family:'DM Sans',sans-serif">${rep.sub.replace('ED ','')}</span>`;
        cell.appendChild(box);
      } else {
        const link=document.createElement('a');
        link.href=rep.href||'#'; link.target='_blank'; link.rel='noopener noreferrer';
        link.style.cssText='width:100%;display:block;text-decoration:none';
        const imgWrap=document.createElement('div');
        imgWrap.style.cssText=`aspect-ratio:1/1;border:2.5px solid ${borderColor};border-radius:8px;overflow:hidden;background:#fff;transition:transform .15s`;
        imgWrap.onmouseenter=()=>{imgWrap.style.transform='translateY(-3px)';};
        imgWrap.onmouseleave=()=>{imgWrap.style.transform='none';};
        const img=document.createElement('img');
        img.src=rep.src; img.alt=rep.sub;
        img.style.cssText='width:100%;height:100%;object-fit:contain;padding:4px;box-sizing:border-box;display:block';
        img.onerror=()=>{img.style.display='none';};
        imgWrap.appendChild(img); link.appendChild(imgWrap); cell.appendChild(link);
      }

      const lbl=document.createElement('div');
      lbl.style.cssText="font-size:.55rem;font-family:'DM Mono',monospace;color:#c9a22799;text-align:center;line-height:1.2;font-weight:700;text-transform:uppercase";
      lbl.textContent=rep.label; cell.appendChild(lbl);

      const sub=document.createElement('div');
      sub.style.cssText="font-size:.55rem;font-family:'DM Mono',monospace;color:#c9a22766;text-align:center;line-height:1.2";
      sub.textContent=rep.sub; cell.appendChild(sub);

      grid.appendChild(cell);
    });

    wrap.appendChild(grid);
    panel.appendChild(wrap);

  } catch(e) {
    errEl.textContent='⚠ '+e.message; errEl.style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='Search';
  }
}

// Initial render
elRender();
rdRender();
</script>
</body>
</html>
