name: Refresh permits data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://bkcb6.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run data refresh scripts
        run: |
          python scripts/build_cb6_dob_now_recent_feed.py
          python scripts/build_cb6_dot_recent_feed.py
          python scripts/build_cb6_film_permits_feed.py
          python scripts/build_cb6_permitted_events_feed.py
          python scripts/build_cb6_resurfacing_feed.py

      - name: Commit updated data files
        run: |
          git config user.email "mracioppo@cb.nyc.gov"
          git config user.name "Mike Racioppo"
          git add data/cb6_dob_now_recent.json \
                  data/cb6_dot_recent.json \
                  data/cb6_film_permits.json \
                  data/cb6_permitted_events.json \
                  data/cb6_street_resurfacing.json
          git diff --cached --quiet || git commit -m "Auto-refresh permits data $(date -u +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
