<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leaderboard -- NYC Gov Org Chart Quiz -- CB6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--navy:#0d1b4b;--orange:#f47920;--border:#e5e2db;--muted:#6b6760;--off:#f8f7f4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--navy)}
header{background:var(--navy);border-bottom:4px solid var(--orange);padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{color:#fff;font-size:1rem;font-weight:700}
header h1 span{color:var(--orange)}
.back{background:none;border:none;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.content{padding:20px;max-width:500px;margin:0 auto}
.stats{display:flex;gap:24px;margin-bottom:20px;background:#fff;padding:14px 16px;border-radius:10px;border:1px solid var(--border)}
.stat strong{display:block;font-size:1.1rem;font-weight:700;color:var(--navy)}
.stat span{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--muted)}
.lb-card{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.lb-header{padding:12px 16px;background:var(--navy);display:flex;gap:10px}
.lb-header div{font-size:.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6);font-weight:700}
.lb-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--off)}
.lb-row:last-child{border-bottom:none}
.lb-row.gold{background:#fffbeb}
.lb-row.silver{background:#f8f9fa}
.lb-row.bronze{background:#fff8f5}
.lb-rank{font-size:.85rem;font-family:'DM Mono',monospace;font-weight:700;width:24px;text-align:center;color:var(--muted)}
.lb-rank.r1{color:#f59e0b}
.lb-rank.r2{color:#9ca3af}
.lb-rank.r3{color:#cd7c4a}
.lb-initials{font-size:.95rem;font-weight:700;color:var(--navy);width:50px}
.lb-score{font-size:.9rem;font-weight:700;color:var(--orange);width:50px}
.lb-role{font-size:.75rem;color:var(--muted);flex:1}
.lb-empty{padding:24px;text-align:center;font-size:.85rem;color:var(--muted);font-style:italic}
.take-btn{display:block;text-align:center;margin-top:16px;padding:12px;background:var(--orange);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem}
footer{padding:20px;text-align:center;font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace}
</style>
</head>
<body>
<header>
  <button class="back" onclick="location.href='quiz-org.html'">&#8592; Back to Quiz</button>
  <h1>Brooklyn <span>Community Board 6</span></h1>
</header>
<div class="content">
  <div class="stats">
    <div class="stat"><strong id="total">--</strong><span>Total takers</span></div>
    <div class="stat"><strong id="avg">--</strong><span>Avg score</span></div>
  </div>
  <div class="lb-card">
    <div class="lb-header">
      <div style="width:24px">#</div>
      <div style="width:50px">Name</div>
      <div style="width:50px">Score</div>
      <div style="flex:1">Rank</div>
    </div>
    <div id="lb-body"><div class="lb-empty">No entries yet. Be the first.</div></div>
  </div>
  <a href="quiz-org.html" class="take-btn">Take the Quiz</a>
  <a href="https://forms.gle/j66MEcnDPWi9Tewd9" target="_blank" style="display:block;text-align:center;margin-top:10px;padding:12px;background:#fff;border:1.5px solid var(--orange);color:var(--navy);border-radius:8px;text-decoration:none;font-weight:600;font-size:.85rem">Get notified when new quizzes drop &#8599;</a>
</div>
<footer>Brooklyn Community Board 6 &middot; 250 Baltic Street</footer>
<script>
function getStore(key, def) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}

function render() {
  var stats = getStore('org_stats', {total:0, scoreSum:0});
  var lb = getStore('org_lb', []);
  
  document.getElementById('total').textContent = stats.total || 0;
  var avg = stats.total > 0 ? Math.round(stats.scoreSum / stats.total * 10) / 10 : '--';
  document.getElementById('avg').textContent = avg !== '--' ? avg + '/10' : '--';

  var body = document.getElementById('lb-body');
  if (!lb.length) {
    body.innerHTML = '<div class="lb-empty">No entries yet. Be the first.</div>';
    return;
  }
  var rankClass = ['r1','r2','r3'];
  var rowClass = ['gold','silver','bronze'];
  body.innerHTML = lb.map(function(e, i) {
    return '<div class="lb-row ' + (rowClass[i]||'') + '">' +
      '<div class="lb-rank ' + (rankClass[i]||'') + '">' + (i+1) + '</div>' +
      '<div class="lb-initials">' + e.initials + '</div>' +
      '<div class="lb-score">' + e.score + '/10</div>' +
      '<div class="lb-role">' + e.role + '</div>' +
      '</div>';
  }).join('');
}

render();
</script>
</body>
</html>
